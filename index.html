<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NGO Platform</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #eef5ee, #f9fbf9);
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #4CAF50;
  color: white;
}

nav button {
  background: white;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
}

/* Sections */
.section {
  display: none;
  padding: 40px;
}

.active {
  display: block;
}

/* Forms */
.form {
  max-width: 300px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
}

button.main {
  width: 100%;
  background: #4CAF50;
  color: white;
}

/* Dashboard */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<nav>
  <h2>NGO 🌿</h2>
  <div>
    <button onclick="show('home')">Home</button>
    <button onclick="show('login')">Login</button>
    <button onclick="show('signup')">Signup</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="section active">
  <h1>Make The World Better 🌍</h1>
  <p>Your small help can change lives</p>
</div>

<!-- LOGIN -->
<div id="login" class="section">
  <div class="form">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="main" onclick="login()">Login</button>
  </div>
</div>

<!-- SIGNUP -->
<div id="signup" class="section">
  <div class="form">
    <h2>Signup</h2>
    <input id="signupEmail" placeholder="Email">
    <input id="signupPass" type="password" placeholder="Password">
    <button class="main" onclick="signup()">Signup</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
  <h2>Dashboard 🌿</h2>

  <div class="cards">
    <div class="card">₹50,000 Funds</div>
    <div class="card">120 Volunteers</div>
    <div class="card">35 Campaigns</div>
    <div class="card">500+ Lives Impacted</div>
  </div>
</div>

<script>
function show(id) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* Signup */
function signup() {
  let email = document.getElementById("signupEmail").value;
  let pass = document.getElementById("signupPass").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  users.push({ email, pass });
  localStorage.setItem("users", JSON.stringify(users));

  alert("Account created!");
  show("login");
}

/* Login */
function login() {
  let email = document.getElementById("loginEmail").value;
  let pass = document.getElementById("loginPass").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u => u.email === email && u.pass === pass);

  if (user) {
    localStorage.setItem("loggedIn", true);
    show("dashboard");
  } else {
    alert("Invalid login");
  }
}

/* Logout */
function logout() {
  localStorage.removeItem("loggedIn");
  show("home");
}

/* Auto login */
if (localStorage.getItem("loggedIn")) {
  show("dashboard");
}
</script>

</body>
</html>
