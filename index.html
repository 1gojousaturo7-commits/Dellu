<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  --text: #1b5e20;
  --card: rgba(255,255,255,0.85);
}
.dark {
  --bg: #121212;
  --text: #ffffff;
  --card: rgba(255,255,255,0.08);
}
body { margin:0; font-family:'Poppins'; background:var(--bg); color:var(--text); }

.sidebar {
  position:fixed; top:0; left:0; width:220px; height:100vh;
  background:rgba(0,0,0,0.05);
  display:flex; flex-direction:column; align-items:center;
  padding-top:20px; gap:15px;
}

.sidebar button {
  width:85%; padding:12px; background:#43a047;
  color:white; border:none; border-radius:12px; cursor:pointer;
}

.main { margin-left:220px; padding:40px; }

.section { display:none; }
.active { display:block; }

.glass {
  background:var(--card);
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
}

button {
  padding:12px;
  background:#43a047;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:20px;
}

.card {
  padding:20px;
  border-radius:15px;
  color:white;
}

.card:nth-child(1){background:#43a047;}
.card:nth-child(2){background:#2e7d32;}
.card:nth-child(3){background:#66bb6a;}

.progress { background:#ddd; border-radius:10px; overflow:hidden; }
.progress-bar { height:20px; background:#43a047; width:0%; }

.history-item {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #ccc;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🌿 NGO</h2>
  <button onclick="show('home')">🏠 Home</button>
  <button onclick="show('login')">🔐 Login</button>
  <button onclick="show('signup')">➕ Signup</button>
  <button onclick="show('dashboard')">📊 Dashboard</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<div class="main">

<!-- HOME -->
<div id="home" class="section active">
<h1>Make a Difference 🌍</h1>
<p>Together we build a greener future</p>

<div class="cards">
  <div class="card"><h3 id="homeFundsCard">₹0</h3><p>Funds</p></div>
  <div class="card"><h3 id="homeLivesCard">0</h3><p>Lives</p></div>
</div>

<div class="glass">
  <h3>🎯 Goal: 10,000 Lives</h3>
  <p id="homeGoalText"></p>
  <div class="progress">
    <div id="homeProgressBar" class="progress-bar"></div>
  </div>
</div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="section">
<h2>Signup</h2>
<input id="signupEmail" placeholder="Email">
<input id="signupPass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<div class="glass">
<h3>Donate</h3>
<input id="donationAmount" type="number" placeholder="Amount">
<button onclick="donate()">Donate</button>
</div>

<div class="glass">
<h3>Donation History</h3>
<div id="history"></div>
</div>
</div>

</div>

<script>
const BASE_URL = "https://ngo-backend-5zc1.onrender.com";

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function logout(){
  localStorage.removeItem("token");
  localStorage.removeItem("currentUser");
  alert("Logged out");
  show("login");
}

// SIGNUP
async function signup(){
  const res = await fetch(`${BASE_URL}/api/signup`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      name: signupEmail.value,
      email: signupEmail.value,
      password: signupPass.value
    })
  });

  const data = await res.json();
  alert(data.message);
}

// LOGIN
async function login(){
  const res = await fetch(`${BASE_URL}/api/login`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: loginEmail.value,
      password: loginPass.value
    })
  });

  const data = await res.json();

  if(res.ok){
    localStorage.setItem("token", data.token);
    localStorage.setItem("currentUser", data.name);
    show("dashboard");
    update();
  } else {
    alert(data.message);
  }
}

// DONATE
async function donate(){
  let amount = Number(donationAmount.value);

  if(amount <= 0) return alert("Invalid amount");

  await fetch(`${BASE_URL}/api/donations`, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": localStorage.getItem("token")
    },
    body: JSON.stringify({
      name: localStorage.getItem("currentUser"),
      amount
    })
  });

  alert("Donation successful ❤️");
  update();
}

// FETCH DATA
async function update(){
  try{
    const res = await fetch(`${BASE_URL}/api/donations`, {
      headers:{
        "Authorization": localStorage.getItem("token")
      }
    });

    const data = await res.json();

    let total = data.reduce((s,d)=>s+Number(d.amount||0),0);
    let lives = Math.floor(total/500000);

    homeFundsCard.innerText="₹"+total.toLocaleString();
    homeLivesCard.innerText=lives;

    let percent=Math.min((lives/10000)*100,100);
    homeProgressBar.style.width=percent+"%";
    homeGoalText.innerText=`${lives} / 10000 Lives`;

    history.innerHTML="";
    data.forEach(d=>{
      history.innerHTML+=`<div class="history-item">
        <span>${d.name}</span><span>₹${d.amount}</span>
      </div>`;
    });

  }catch(err){
    console.log(err);
  }
}

update();
</script>

</body>
</html>
