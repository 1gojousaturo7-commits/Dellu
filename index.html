<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NGO Impact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

:root {
  --bg:#0f2027;
  --text:white;
  --card:rgba(255,255,255,0.08);
}

/* GREEN LIGHT MODE */
.light {
  --bg:#e8f5e9;
  --text:#1b5e20;
  --card:#ffffff;
}

/* NAV */
header {
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:rgba(0,0,0,0.3);
}

button {
  padding:10px 16px;
  border:none;
  border-radius:20px;
  background:#ff6b6b;
  color:white;
  cursor:pointer;
}
button:hover {background:#ff3b3b;}

.container {padding:60px;text-align:center;}

/* HERO */
.hero h1 {font-size:50px;margin-bottom:10px;}
.hero p {margin-bottom:20px;color:#ccc;}

/* CENTER CARD */
.card {
  background:var(--card);
  padding:25px;
  margin:40px auto;
  border-radius:15px;
  width:300px;
}

/* NGO GRID */
.ngo img {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* INPUT */
input {
  padding:10px;
  width:90%;
  border-radius:8px;
  border:none;
  margin:5px;
}

/* LIST */
ul {list-style:none;}
ul li {
  background:rgba(255,255,255,0.05);
  margin:8px 0;
  padding:10px;
  border-radius:8px;
}

/* CHAT */
#chatbox {
  position:fixed;
  bottom:20px;
  right:20px;
  width:260px;
  background:var(--card);
  border-radius:12px;
}

#chatheader {
  background:#ff6b6b;
  padding:10px;
  cursor:pointer;
}

#chatbody {display:none;padding:10px;}
#chatlog {height:150px;overflow:auto;font-size:13px;}
</style>
</head>

<body>

<header>
  <h2>❤️ NGO Impact</h2>
  <div>
    <button onclick="showHome()">Home</button>
    <button id="loginBtn" onclick="showLogin()">Login</button>
    <button id="signupBtn" onclick="showSignup()">Signup</button>
    <button id="dashboardBtn" onclick="showDashboard()" style="display:none;">Dashboard</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
    <button onclick="toggleTheme()">🌗</button>
  </div>
</header>

<div class="container" id="app"></div>

<!-- CHAT -->
<div id="chatbox">
  <div id="chatheader" onclick="toggleChat()">💬 Help</div>
  <div id="chatbody">
    <div id="chatlog"></div>
    <input id="chatInput">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const API="https://ngo-backend-5zc1.onrender.com";
let token=localStorage.getItem("token");

function toggleTheme(){
  document.body.classList.toggle("light");
}

function updateNav(){
  loginBtn.style.display=token?"none":"inline";
  signupBtn.style.display=token?"none":"inline";
  dashboardBtn.style.display=token?"inline":"none";
  logoutBtn.style.display=token?"inline":"none";
}

/* HOME */
function showHome(){
  app.innerHTML=`
  <div class="hero">
    <h1>Donate & Save Lives 🌍</h1>
    <p>Transparency. Trust. Impact.</p>
    <button onclick="showLogin()">Get Started</button>
  </div>

  <div class="card">
    <h3>Impact</h3>
    <p>₹500 = Feeds 5 people</p>
    <p>₹1000 = Educates a child</p>
  </div>

  <div class="card ngo">
    <h3>Explore NGOs</h3>
    <img src="https://images.unsplash.com/photo-1469571486292-b53601020a05">
    <p>🍛 Food NGO</p>

    <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7">
    <p>📚 Education NGO</p>

    <img src="https://images.unsplash.com/photo-1584515933487-779824d29309">
    <p>🏥 Health NGO</p>
  </div>`;
}

/* LOGIN */
function showLogin(){
  app.innerHTML=`
  <div class="card">
    <h2>Login</h2>
    <input id="email"><br>
    <input id="password" type="password"><br>
    <button onclick="login()">Login</button>
  </div>`;
}

async function login(){
  const res=await fetch(API+"/api/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });
  const data=await res.json();
  if(data.token){
    token=data.token;
    localStorage.setItem("token",token);
    updateNav();
    showDashboard();
  }
}

/* SIGNUP */
function showSignup(){
  app.innerHTML=`
  <div class="card">
    <h2>Signup</h2>
    <input id="email"><br>
    <input id="password" type="password"><br>
    <button onclick="signup()">Signup</button>
  </div>`;
}

async function signup(){
  await fetch(API+"/api/auth/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });
  alert("Signup done");
  showLogin();
}

/* DASHBOARD */
function showDashboard(){
  app.innerHTML=`
  <div class="card">
    <h3>Donate</h3>
    <input id="amount">
    <button onclick="donate()">Donate</button>
  </div>

  <div class="card">
    <h3>Total</h3>
    ₹<span id="total">0</span>
  </div>

  <div class="card">
    <h3>History</h3>
    <ul id="donations"></ul>
  </div>`;
  loadDonations();
}

/* PAYMENT UI */
function donate(){
  let amt=amount.value;
  app.innerHTML=`
  <div class="card">
    <h2>💳 Payment</h2>
    <p>Amount: ₹${amt}</p>
    <button onclick="confirmPayment(${amt})">Pay Now</button>
  </div>`;
}

async function confirmPayment(amount){
  await fetch(API+"/api/donations",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({amount})
  });
  alert("Payment Successful");
  showDashboard();
}

/* LOAD */
async function loadDonations(){
  const res=await fetch(API+"/api/donations",{headers:{Authorization:"Bearer "+token}});
  const data=await res.json();
  let total=0;
  donations.innerHTML="";
  data.slice().reverse().forEach(d=>{
    total+=Number(d.amount);
    donations.innerHTML+=`<li>₹${d.amount}</li>`;
  });
  totalEl=document.getElementById("total");
  if(totalEl) totalEl.innerText=total;
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  token=null;
  updateNav();
  showHome();
}

/* CHAT */
function toggleChat(){
  chatbody.style.display=chatbody.style.display==="none"?"block":"none";
}

function sendMsg(){
  let msg=chatInput.value.toLowerCase();
  chatlog.innerHTML+=`<div>🧑 ${msg}</div>`;

  let reply="Ask about donations or NGOs";

  if(msg.includes("donation")) reply="Donate from dashboard and track history";
  else if(msg.includes("money")) reply="Funds go to food, education and health";
  else if(msg.includes("how")) reply="Signup → Login → Donate";

  chatlog.innerHTML+=`<div>🤖 ${reply}</div>`;
  chatInput.value="";
}

/* INIT */
updateNav();
showHome();
</script>

</body>
</html>
