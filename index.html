<!DOCTYPE html>
<html>
<head>
  <title>DELLU NGO System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 to-black text-white min-h-screen flex items-center justify-center">

<!-- LOGIN PAGE -->
<div id="loginPage" class="bg-gray-800 p-8 rounded-2xl shadow-lg w-80">
  <h2 class="text-2xl font-bold mb-4 text-center">🔐 Login - DELLU</h2>

  <input id="username" placeholder="Username"
    class="w-full p-2 text-black mb-3 rounded">

  <input id="password" type="password" placeholder="Password"
    class="w-full p-2 text-black mb-3 rounded">

  <button onclick="login()"
    class="w-full bg-blue-500 py-2 rounded hover:bg-blue-600">
    Login
  </button>

  <p id="error" class="text-red-400 mt-2 text-sm"></p>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden w-full p-10">

  <h1 class="text-4xl font-bold mb-6">🌐 DELLU NGO Dashboard</h1>

  <!-- NAVBAR -->
  <div class="flex gap-4 mb-6">
    <button onclick="show('donate')" class="bg-green-500 px-4 py-2 rounded">Donate</button>
    <button onclick="show('ai')" class="bg-blue-500 px-4 py-2 rounded">AI</button>
    <button onclick="show('transparency')" class="bg-purple-500 px-4 py-2 rounded">Transparency</button>
    <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">Logout</button>
  </div>

  <!-- DONATE -->
  <div id="donate" class="section">
    <h2 class="text-xl mb-3">💰 Add Donation</h2>
    <input id="name" placeholder="Name" class="p-2 text-black block mb-2">
    <input id="amount" placeholder="Amount" class="p-2 text-black block mb-2">
    <input id="usage" placeholder="Usage" class="p-2 text-black block mb-2">
    <button onclick="addDonation()" class="bg-green-500 px-4 py-2 rounded">Add</button>
  </div>

  <!-- AI -->
  <div id="ai" class="section hidden">
    <h2 class="text-xl mb-3">🤖 AI Assistant</h2>
    <input id="question" placeholder="Ask..." class="p-2 text-black w-80 mb-2">
    <button onclick="fakeAI()" class="bg-blue-500 px-4 py-2 rounded">Ask</button>
    <p id="aiResponse" class="mt-3"></p>
  </div>

  <!-- TRANSPARENCY -->
  <div id="transparency" class="section hidden">
    <h2 class="text-xl mb-3">🔍 Transparency</h2>
    <div id="list"></div>
  </div>

</div>

<script>
  // LOGIN
  function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234") {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
    } else {
      document.getElementById("error").innerText = "Invalid login";
    }
  }

  function logout() {
    location.reload();
  }

  // NAVIGATION
  function show(section) {
    document.querySelectorAll(".section").forEach(s => s.classList.add("hidden"));
    document.getElementById(section).classList.remove("hidden");
  }

  // DONATIONS
  let donations = [];

  function addDonation() {
    const name = document.getElementById("name").value;
    const amount = document.getElementById("amount").value;
    const usage = document.getElementById("usage").value;

    donations.push({name, amount, usage});
    render();
  }

  function render() {
    const list = document.getElementById("list");

    list.innerHTML = donations.map(d =>
      `<div class="bg-gray-700 p-3 mt-2 rounded shadow">
        ${d.name} donated ₹${d.amount}<br>
        <small>Used for: ${d.usage}</small>
      </div>`
    ).join("");
  }

  // AI (DEMO)
  function fakeAI() {
    const q = document.getElementById("question").value;

    let res = "I can help with NGO operations.";

    if(q.includes("donation")) res = "All donations are shown in transparency section.";
    if(q.includes("volunteer")) res = "Volunteers can join events and help NGOs.";

    document.getElementById("aiResponse").innerText = res;
  }
</script>

</body>
</html>
