<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Platform</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.navbar {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.navbar button {
  margin-left:10px;
  padding:8px 15px;
  border:none;
  border-radius:8px;
  background:#ff6b6b;
  color:white;
  cursor:pointer;
}

.hero {
  display:flex;
  justify-content:space-between;
  padding:60px;
}

.card {
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  width:250px;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
}

button.main {
  width:100%;
  background:#00c9a7;
}

.section { display:none; }
.active { display:block; }

.history-item {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #aaa;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>❤️ NGO</h2>

  <div id="navButtons">
    <!-- dynamic -->
  </div>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <div>
      <h1>Donate & Save Lives 🌍</h1>
      <p>Help provide food, shelter & hope</p>
      <button onclick="show('login')">Get Started</button>
    </div>

    <div class="card">
      <h3>Donate Now</h3>
      <input id="donationAmount" placeholder="Enter amount">
      <button class="main" onclick="donate()">Donate</button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="section">
  <h2>Signup</h2>
  <input id="signupEmail" placeholder="Email">
  <input id="signupPass" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
  <h2>Your Dashboard</h2>

  <div class="card">
    <h3>Your Donations</h3>
    <div id="userHistory"></div>
  </div>

  <div class="card">
    <h3>Your Badge 🏆</h3>
    <p id="badge"></p>
  </div>
</div>

<script>

// 🔥 NAVBAR CONTROL
function updateNavbar(){
  let user = localStorage.getItem("currentUser");
  let nav = document.getElementById("navButtons");

  if(user){
    nav.innerHTML = `
      <button onclick="show('home')">Home</button>
      <button onclick="show('dashboard')">Dashboard</button>
      <button onclick="logout()">Logout</button>
    `;
  } else {
    nav.innerHTML = `
      <button onclick="show('home')">Home</button>
      <button onclick="show('login')">Login</button>
      <button onclick="show('signup')">Signup</button>
    `;
  }
}

// PAGE SWITCH
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  update();
}

// SIGNUP
function signup(){
  let users = JSON.parse(localStorage.getItem("users")) || [];
  users.push({
    email: signupEmail.value,
    pass: signupPass.value
  });

  localStorage.setItem("users", JSON.stringify(users));
  alert("Signup successful!");

  show("login"); // 🔥 redirect to login
}

// LOGIN
function login(){
  let users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u =>
    u.email === loginEmail.value &&
    u.pass === loginPass.value
  );

  if(user){
    localStorage.setItem("currentUser", user.email);
    updateNavbar(); // 🔥 update UI
    show("dashboard");
  } else {
    alert("Invalid login");
  }
}

// LOGOUT
function logout(){
  localStorage.removeItem("currentUser");
  updateNavbar(); // 🔥 update UI
  show("home");   // 🔥 go back to home
}

// DONATE
function donate(){
  let user = localStorage.getItem("currentUser");

  if(!user){
    alert("Login first!");
    show("login");
    return;
  }

  let amount = Number(donationAmount.value);
  if(amount <= 0) return alert("Invalid amount");

  let data = JSON.parse(localStorage.getItem("donations")) || [];

  data.push({
    name:user,
    amount:amount
  });

  localStorage.setItem("donations", JSON.stringify(data));

  alert("Donation successful ❤️");
  update();
}

// UPDATE DASHBOARD
function update(){
  let user = localStorage.getItem("currentUser");
  let data = JSON.parse(localStorage.getItem("donations")) || [];

  // FILTER USER DATA
  let userData = data.filter(d => d.name === user);

  // SHOW HISTORY
  userHistory.innerHTML = "";
  userData.slice().reverse().forEach(d=>{
    let div = document.createElement("div");
    div.className="history-item";
    div.innerHTML = `<span>₹${d.amount}</span>`;
    userHistory.appendChild(div);
  });

  // BADGES
  let total = userData.reduce((s,d)=>s+d.amount,0);

  let badgeText = "No Badge";
  if(total > 5000) badgeText = "🥇 Gold Donor";
  else if(total > 2000) badgeText = "🥈 Silver Donor";
  else if(total > 500) badgeText = "🥉 Bronze Donor";

  badge.innerText = badgeText;
}

// INIT
updateNavbar();
update();

</script>

</body>
</html>
