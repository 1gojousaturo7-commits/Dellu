<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}
.nav button{
  margin-left:10px;
  background:#ff6b6b;
}

/* HERO */
.hero{
  display:flex;
  justify-content:space-between;
  padding:60px;
}

/* DONATE BOX */
.donate-box{
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  width:300px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.08);
  margin:20px;
  padding:20px;
  border-radius:15px;
}

/* CHATBOT */
.chatbot{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00c853;
  padding:15px;
  border-radius:50%;
  cursor:pointer;
}

/* BADGE */
.badge{
  padding:5px 10px;
  border-radius:10px;
  display:inline-block;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <h2>❤️ NGO</h2>
  <div>
    <button onclick="show('home')">Home</button>
    <button onclick="show('login')" id="loginBtn">Login</button>
    <button onclick="show('signup')" id="signupBtn">Signup</button>
    <button onclick="show('dashboard')" id="dashBtn" style="display:none;">Dashboard</button>
    <button onclick="logout()" id="logoutBtn" style="display:none;">Logout</button>
  </div>
</div>

<!-- HOME -->
<div id="home">

<div class="hero">
  <div>
    <h1>Donate & Save Lives 🌍</h1>
    <p>Every contribution counts. Help us provide food, shelter and hope.</p>

    <h3 id="impactText">₹0 = 0 lives saved</h3>

    <button onclick="show('signup')">Get Started</button>
  </div>

  <div class="donate-box">
    <h3>Donate Now</h3>
    <input id="amount" placeholder="Enter amount">
    <button onclick="donate()">Donate</button>

    <p id="suggestion"></p>
  </div>
</div>

<!-- TRANSPARENCY -->
<div class="glass">
  <h3>Where your money goes 📊</h3>
  <p>🍛 Food: 40%</p>
  <p>📚 Education: 35%</p>
  <p>🏥 Medical: 25%</p>
</div>

</div>

<!-- LOGIN -->
<div id="login" style="display:none;" class="glass">
<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- SIGNUP -->
<div id="signup" style="display:none;" class="glass">
<h2>Signup</h2>
<input id="signupEmail" placeholder="Email">
<input id="signupPass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="glass">
<h3>Your Badge 🏆</h3>
<div id="badge"></div>
</div>

<div class="glass">
<h3>Your Donations</h3>
<div id="history"></div>
</div>

</div>

<!-- CHATBOT -->
<div class="chatbot" onclick="chat()">💬</div>

<script>
const API="https://ngo-backend-5zc1.onrender.com/api";

function show(id){
  document.getElementById("home").style.display="none";
  document.getElementById("login").style.display="none";
  document.getElementById("signup").style.display="none";
  document.getElementById("dashboard").style.display="none";

  document.getElementById(id).style.display="block";
}

/* AUTH UI */
function updateUI(){
  let token=localStorage.getItem("token");

  loginBtn.style.display=token?"none":"inline";
  signupBtn.style.display=token?"none":"inline";
  dashBtn.style.display=token?"inline":"none";
  logoutBtn.style.display=token?"inline":"none";
}

/* SIGNUP */
async function signup(){
  await fetch(API+"/auth/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:signupEmail.value,
      password:signupPass.value
    })
  });

  alert("Signup done");
  show("login");
}

/* LOGIN */
async function login(){
  let res=await fetch(API+"/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:loginEmail.value,
      password:loginPass.value
    })
  });

  let data=await res.json();

  if(data.token){
    localStorage.setItem("token",data.token);
    updateUI();
    show("dashboard");
    loadHistory();
  } else {
    alert("Login failed");
  }
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  updateUI();
  show("home");
}

/* DONATE */
async function donate(){
  let amount=Number(document.getElementById("amount").value);

  document.getElementById("impactText").innerText =
    "₹"+amount+" = "+Math.floor(amount/500)+" meals 🍛";

  if(amount<100) suggestion.innerText="Try ₹500 to feed 1 family";
  else suggestion.innerText="You're making a big impact ❤️";

  let token=localStorage.getItem("token");
  if(!token){
    alert("Login first");
    show("login");
    return;
  }

  await fetch(API+"/donations",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({amount})
  });

  alert("Donation successful ❤️");
  loadHistory();
}

/* HISTORY + BADGE */
async function loadHistory(){
  let token=localStorage.getItem("token");

  let res=await fetch(API+"/donations/my",{
    headers:{Authorization:"Bearer "+token}
  });

  let data=await res.json();

  let total=0;
  history.innerHTML="";

  data.forEach(d=>{
    total+=d.amount;
    history.innerHTML+=`<div>₹${d.amount}</div>`;
  });

  let b="Bronze";
  if(total>5000) b="Silver";
  if(total>20000) b="Gold";

  badge.innerHTML=`<span class="badge">${b} Donor</span>`;
}

/* AI CHATBOT */
async function chat(){
  let msg=prompt("Ask about donations");

  let res=await fetch(API+"/ai",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  let data=await res.json();

  alert("AI: "+data.reply);
}

updateUI();
</script>

</body>
</html>
