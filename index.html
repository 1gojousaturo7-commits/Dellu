<!DOCTYPE html>
<html>
<head>
  <title>DELLU NGO System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 to-black text-white min-h-screen flex items-center justify-center">

<!-- LOGIN / SIGNUP -->
<div id="authPage" class="bg-gray-800 p-8 rounded-2xl shadow-lg w-80">
  <h2 class="text-2xl font-bold mb-4 text-center">🔐 DELLU</h2>

  <input id="email" placeholder="Email" class="w-full p-2 text-black mb-3 rounded">
  <input id="password" type="password" placeholder="Password" class="w-full p-2 text-black mb-3 rounded">

  <button onclick="login()" class="w-full bg-blue-500 py-2 rounded mb-2">Login</button>

  <button onclick="signup()" class="w-full bg-green-500 py-2 rounded mb-2">Sign Up</button>

  <button class="w-full bg-red-500 py-2 rounded">Login with Google</button>

  <p id="error" class="text-red-400 mt-2 text-sm"></p>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden w-full p-10">

  <h1 class="text-3xl font-bold mb-2">🌐 DELLU Dashboard</h1>
  <p id="welcome" class="mb-6 text-gray-300"></p>

  <!-- NAV -->
  <div class="flex gap-4 mb-6">
    <button onclick="show('donate')" class="bg-green-500 px-4 py-2 rounded">Donate</button>
    <button onclick="show('ai')" class="bg-blue-500 px-4 py-2 rounded">AI</button>
    <button onclick="show('transparency')" class="bg-purple-500 px-4 py-2 rounded">Transparency</button>
    <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">Logout</button>
  </div>

  <!-- DONATE -->
  <div id="donate" class="section">
    <input id="name" placeholder="Name" class="p-2 text-black block mb-2">
    <input id="amount" placeholder="Amount" class="p-2 text-black block mb-2">
    <input id="usage" placeholder="Usage" class="p-2 text-black block mb-2">
    <button onclick="addDonation()" class="bg-green-500 px-4 py-2 rounded">Add Donation</button>
  </div>

  <!-- AI -->
  <div id="ai" class="section hidden">
    <input id="question" placeholder="Ask..." class="p-2 text-black mb-2">
    <button onclick="fakeAI()" class="bg-blue-500 px-4 py-2 rounded">Ask</button>
    <p id="aiResponse" class="mt-3"></p>
  </div>

  <!-- TRANSPARENCY -->
  <div id="transparency" class="section hidden">
    <div id="list"></div>
  </div>

</div>

<script>
  // LOAD SAVED DATA
  let donations = JSON.parse(localStorage.getItem("donations")) || [];

  // SIGNUP
  function signup() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    localStorage.setItem("user", JSON.stringify({ email, pass }));
    alert("Account created! Now login.");
  }

  // LOGIN
  function login() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    const user = JSON.parse(localStorage.getItem("user"));

    if(user && user.email === email && user.pass === pass) {
      startApp(email);
    } else {
      document.getElementById("error").innerText = "Invalid login";
    }
  }

  function startApp(email) {
    document.getElementById("authPage").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("welcome").innerText = "Welcome, " + email;
    render();
  }

  function logout() {
    location.reload();
  }

  // NAV
  function show(section) {
    document.querySelectorAll(".section").forEach(s => s.classList.add("hidden"));
    document.getElementById(section).classList.remove("hidden");
  }

  // ADD DONATION
  function addDonation() {
    const name = document.getElementById("name").value;
    const amount = document.getElementById("amount").value;
    const usage = document.getElementById("usage").value;

    donations.push({ name, amount, usage });

    localStorage.setItem("donations", JSON.stringify(donations));

    render();
  }

  // RENDER DATA
  function render() {
    const list = document.getElementById("list");

    list.innerHTML = donations.map(d =>
      `<div class="bg-gray-700 p-3 mt-2 rounded">
        ${d.name} donated ₹${d.amount}<br>
        <small>Used for: ${d.usage}</small>
      </div>`
    ).join("");
  }

  // AI DEMO
  function fakeAI() {
    const q = document.getElementById("question").value;

    let res = "I can help with NGO tasks.";

    if(q.includes("donation")) res = "Check transparency section.";
    if(q.includes("volunteer")) res = "Volunteers can join events.";

    document.getElementById("aiResponse").innerText = res;
  }
</script>

</body>
</html>
