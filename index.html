<!DOCTYPE html>
<html>
<head>
  <title>DELLU NGO System</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background-color: #0b0f1a;
      background-image: 
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>

<body class="text-white min-h-screen flex items-center justify-center">

<!-- LOGIN PAGE -->
<div id="loginPage" class="flex items-center justify-center w-full">
  <div class="bg-[#121826] p-8 rounded-2xl shadow-2xl w-96 border border-gray-700">

    <h2 class="text-2xl font-semibold text-center mb-6">Log In</h2>

    <label class="text-gray-400 text-sm">Email</label>
    <input id="loginEmail" type="email" placeholder="you@example.com"
      class="w-full mt-1 mb-4 p-3 rounded-lg bg-[#0b0f1a] border border-gray-600">

    <label class="text-gray-400 text-sm">Password</label>
    <input id="loginPassword" type="password" placeholder="••••••"
      class="w-full mt-1 mb-6 p-3 rounded-lg bg-[#0b0f1a] border border-gray-600">

    <button onclick="login()"
      class="w-full bg-green-500 py-3 rounded-lg font-semibold hover:bg-green-600">
      Log In
    </button>

    <p class="text-gray-400 text-sm text-center mt-4">
      Don’t have an account?
      <span onclick="showSignup()" class="text-green-400 cursor-pointer">Create an account</span>
    </p>

  </div>
</div>

<!-- SIGNUP PAGE -->
<div id="signupPage" class="hidden flex items-center justify-center w-full">
  <div class="bg-[#121826] p-8 rounded-2xl shadow-2xl w-96 border border-gray-700">

    <h2 class="text-2xl font-semibold text-center mb-6">Create Account</h2>

    <label class="text-gray-400 text-sm">Name</label>
    <input id="name" placeholder="Your name"
      class="w-full mt-1 mb-4 p-3 rounded-lg bg-[#0b0f1a] border border-gray-600">

    <label class="text-gray-400 text-sm">Email</label>
    <input id="email" placeholder="you@example.com"
      class="w-full mt-1 mb-4 p-3 rounded-lg bg-[#0b0f1a] border border-gray-600">

    <label class="text-gray-400 text-sm">Password</label>
    <input id="password" type="password" placeholder="••••••"
      class="w-full mt-1 mb-4 p-3 rounded-lg bg-[#0b0f1a] border border-gray-600">

    <label class="text-gray-400 text-sm">Confirm Password</label>
    <input id="confirmPassword" type="password" placeholder="••••••"
      class="w-full mt-1 mb-6 p-3 rounded-lg bg-[#0b0f1a] border border-gray-600">

    <button onclick="signup()"
      class="w-full bg-green-500 py-3 rounded-lg font-semibold hover:bg-green-600">
      Create Account
    </button>

    <p class="text-gray-400 text-sm text-center mt-4">
      Already have an account?
      <span onclick="showLogin()" class="text-green-400 cursor-pointer">Log In</span>
    </p>

  </div>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden w-full p-10">

  <h1 class="text-3xl font-bold mb-2">🌐 DELLU Dashboard</h1>
  <p id="welcome" class="mb-6 text-gray-400"></p>

  <div class="flex gap-4 mb-6">
    <button onclick="show('donate')" class="bg-green-500 px-4 py-2 rounded">Donate</button>
    <button onclick="show('ai')" class="bg-blue-500 px-4 py-2 rounded">AI</button>
    <button onclick="show('transparency')" class="bg-purple-500 px-4 py-2 rounded">Transparency</button>
    <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">Logout</button>
  </div>

  <div id="donate" class="section">
    <input id="donor" placeholder="Name" class="p-2 text-black block mb-2">
    <input id="amount" placeholder="Amount" class="p-2 text-black block mb-2">
    <input id="usage" placeholder="Usage" class="p-2 text-black block mb-2">
    <button onclick="addDonation()" class="bg-green-500 px-4 py-2 rounded">Add Donation</button>
  </div>

  <div id="transparency" class="section hidden">
    <div id="list"></div>
  </div>

</div>

<script>
let donations = JSON.parse(localStorage.getItem("donations")) || [];

function showSignup() {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("signupPage").classList.remove("hidden");
}

function showLogin() {
  document.getElementById("signupPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
}

function signup() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const confirm = document.getElementById("confirmPassword").value;

  if(pass !== confirm) {
    alert("Passwords do not match");
    return;
  }

  localStorage.setItem("user", JSON.stringify({ name, email, pass }));
  alert("Account created!");
  showLogin();
}

function login() {
  const email = document.getElementById("loginEmail").value;
  const pass = document.getElementById("loginPassword").value;

  const user = JSON.parse(localStorage.getItem("user"));

  if(user && user.email === email && user.pass === pass) {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("welcome").innerText = "Welcome, " + user.name;
    render();
  } else {
    alert("Invalid login");
  }
}

function logout() {
  location.reload();
}

function show(section) {
  document.querySelectorAll(".section").forEach(s => s.classList.add("hidden"));
  document.getElementById(section).classList.remove("hidden");
}

function addDonation() {
  const name = document.getElementById("donor").value;
  const amount = document.getElementById("amount").value;
  const usage = document.getElementById("usage").value;

  donations.push({ name, amount, usage });
  localStorage.setItem("donations", JSON.stringify(donations));
  render();
}

function render() {
  const list = document.getElementById("list");

  list.innerHTML = donations.map(d =>
    `<div class="bg-gray-700 p-3 mt-2 rounded">
      ${d.name} donated ₹${d.amount}<br>
      <small>Used for: ${d.usage}</small>
    </div>`
  ).join("");
}
</script>

</body>
</html>
