<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crazy Coders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body {
  background:#0f2027;
  color:white;
}

/* NAV */
header {
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:rgba(0,0,0,0.3);
}

.nav-right {
  display:flex;
  gap:10px;
  align-items:center;
}

button {
  padding:10px 16px;
  border:none;
  border-radius:20px;
  background:#ff6b6b;
  color:white;
  cursor:pointer;
}

/* CONTAINER */
.container {padding:60px;text-align:center;}

/* CARD */
.card {
  background:rgba(255,255,255,0.08);
  padding:25px;
  margin:20px auto;
  border-radius:15px;
  width:300px;
}

/* DASH */
.dash-container {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:30px;
}

/* HISTORY */
.history {
  width:600px;
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
}

.history-item {
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<header>
  <h2>🚀 Crazy Coders</h2>

  <div class="nav-right">
    <span id="profile"></span>
    <button onclick="showHome()">Home</button>
    <button id="loginBtn" onclick="showLogin()">Login</button>
    <button id="signupBtn" onclick="showSignup()">Signup</button>
    <button id="dashboardBtn" onclick="showDashboard()" style="display:none;">Dashboard</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
  </div>
</header>

<div class="container" id="app"></div>

<script>
const API="https://ngo-backend-5zc1.onrender.com";
let token=localStorage.getItem("token");

/* NAV */
function updateNav(){
  let email = localStorage.getItem("email");

  if(token){
    loginBtn.style.display="none";
    signupBtn.style.display="none";
    dashboardBtn.style.display="inline";
    logoutBtn.style.display="inline";

    let username = email ? email.split("@")[0] : "User";
    profile.innerText="👤 " + username;
  } else {
    loginBtn.style.display="inline";
    signupBtn.style.display="inline";
    dashboardBtn.style.display="none";
    logoutBtn.style.display="none";
    profile.innerText="";
  }
}

/* HOME */
function showHome(){
  app.innerHTML=`
  <h1>Crazy Coders 🌍</h1>
  <p>NGO Donation Platform</p>
  <button onclick="showLogin()">Get Started</button>`;
}

/* LOGIN */
function showLogin(){
  app.innerHTML=`
  <div class="card">
    <h2>Login</h2>
    <input id="email"><br><br>
    <input id="password" type="password"><br><br>
    <button onclick="login()">Login</button>
  </div>`;
}

async function login(){
  const res=await fetch(API+"/api/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });

  const data=await res.json();

  if(data.token){
    token=data.token;
    localStorage.setItem("token",token);
    localStorage.setItem("email",email.value);

    updateNav();
    showDashboard();
  }
}

/* SIGNUP */
function showSignup(){
  app.innerHTML=`
  <div class="card">
    <h2>Signup</h2>
    <input id="email"><br><br>
    <input id="password" type="password"><br><br>
    <button onclick="signup()">Signup</button>
  </div>`;
}

async function signup(){
  await fetch(API+"/api/auth/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });

  alert("Signup done");
  showLogin();
}

/* DASHBOARD */
function showDashboard(){
  app.innerHTML=`
  <h1>📊 Dashboard</h1>

  <div class="dash-container">

    <div class="card">
      <h3>💰 Donate</h3>
      <input id="amount" placeholder="Enter amount"><br><br>
      <button onclick="donate()">Donate</button>
    </div>

    <div class="history">
      <h3>📜 Donation History</h3>
      <div id="donations"></div>
    </div>

  </div>
  `;

  loadDonations();
}

/* DONATE */
function donate(){
  let amt=amount.value;
  let email = localStorage.getItem("email");
  let username = email.split("@")[0];

  confirmPayment(username, amt);
}

async function confirmPayment(username, amount){
  await fetch(API+"/api/donations",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({amount, username})
  });

  alert("Donation Successful");
  showDashboard();
}

/* LOAD DONATIONS (🔥 FIXED) */
async function loadDonations(){
  const res=await fetch(API+"/api/donations",{
    headers:{Authorization:"Bearer "+token}
  });

  const data=await res.json();

  donations.innerHTML="";

  data.forEach(d => {
    donations.innerHTML += `
    <div class="history-item">
      <span>👤 ${d.username || "Unknown"}</span>
      <span>₹${d.amount}</span>
    </div>`;
  });
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  localStorage.removeItem("email");
  token=null;
  updateNav();
  showHome();
}

/* INIT */
updateNav();
showHome();
</script>

</body>
</html>
