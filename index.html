<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NGO Impact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

/* NAVBAR */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

h2 {
  color: #ff6b6b;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  background: #ff6b6b;
  color: white;
  transition: 0.3s;
}

button:hover {
  background: #ff3b3b;
  transform: scale(1.05);
}

#nav button {
  margin-left: 10px;
}

/* MAIN CONTAINER */
.container {
  padding: 60px 40px;
  min-height: 80vh;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 80px;
}

.hero h1 {
  font-size: 50px;
  margin-bottom: 15px;
}

.hero p {
  color: #ccc;
  margin-bottom: 25px;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  margin-top: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

/* INPUT */
input {
  padding: 10px;
  margin: 5px;
  width: 220px;
  border-radius: 8px;
  border: none;
}

/* LIST */
ul {
  list-style: none;
  padding: 0;
}

ul li {
  background: rgba(255,255,255,0.05);
  margin: 8px 0;
  padding: 10px;
  border-radius: 8px;
}

/* IMPACT SECTION */
.impact {
  margin-top: 40px;
  text-align: center;
}

.impact p {
  margin: 5px;
  color: #ddd;
}
</style>
</head>

<body>

<header>
  <h2>❤️ NGO Impact</h2>

  <div id="nav">
    <button onclick="showHome()">Home</button>
    <button id="loginBtn" onclick="showLogin()">Login</button>
    <button id="signupBtn" onclick="showSignup()">Signup</button>
    <button id="dashboardBtn" onclick="showDashboard()" style="display:none;">Dashboard</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
  </div>
</header>

<div class="container" id="app"></div>

<script>
const API = "https://ngo-backend-5zc1.onrender.com";
let token = localStorage.getItem("token");

// NAV ELEMENTS
const loginBtn = document.getElementById("loginBtn");
const signupBtn = document.getElementById("signupBtn");
const dashboardBtn = document.getElementById("dashboardBtn");
const logoutBtn = document.getElementById("logoutBtn");
const app = document.getElementById("app");

// NAV UPDATE
function updateNav() {
  if (token) {
    loginBtn.style.display = "none";
    signupBtn.style.display = "none";
    dashboardBtn.style.display = "inline-block";
    logoutBtn.style.display = "inline-block";
  } else {
    loginBtn.style.display = "inline-block";
    signupBtn.style.display = "inline-block";
    dashboardBtn.style.display = "none";
    logoutBtn.style.display = "none";
  }
}

// HOME
function showHome() {
  app.innerHTML = `
    <div class="hero">
      <h1>Donate & Save Lives 🌍</h1>
      <p>Support NGOs, empower communities, and create real impact.</p>
      <button onclick="showLogin()">Get Started</button>
    </div>

    <div class="impact">
      <h2>Our Impact</h2>
      <p>₹500 = Feeds 5 people 🍛</p>
      <p>₹1000 = Educates a child 📚</p>
      <p>₹2000 = Medical support 🏥</p>
    </div>
  `;
}

// LOGIN
function showLogin() {
  app.innerHTML = `
    <div class="card">
      <h2>Login</h2>
      <input id="email" placeholder="Email"><br>
      <input id="password" type="password" placeholder="Password"><br>
      <button onclick="login()">Login</button>
    </div>
  `;
}

async function login() {
  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();

    if (data.token) {
      token = data.token;
      localStorage.setItem("token", token);
      alert("Login success 🚀");
      updateNav();
      showDashboard();
    } else {
      alert(data.message || "Login failed");
    }
  } catch {
    alert("Server error");
  }
}

// SIGNUP
function showSignup() {
  app.innerHTML = `
    <div class="card">
      <h2>Signup</h2>
      <input id="email" placeholder="Email"><br>
      <input id="password" type="password" placeholder="Password"><br>
      <button onclick="signup()">Signup</button>
    </div>
  `;
}

async function signup() {
  try {
    const res = await fetch(`${API}/api/auth/signup`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();

    if (data.message) {
      alert("Signup successful ✅ Please login");
      showLogin();
    } else {
      alert("Signup failed");
    }
  } catch {
    alert("Server error");
  }
}

// DASHBOARD
function showDashboard() {
  if (!token) return showLogin();

  app.innerHTML = `
    <h2>Dashboard</h2>

    <div class="card">
      <h3>Donate</h3>
      <input id="amount" placeholder="Amount">
      <button onclick="donate()">Donate</button>
    </div>

    <div class="card">
      <h3>Your Donations</h3>
      <ul id="donations">Loading...</ul>
    </div>
  `;

  loadDonations();
}

// DONATE
async function donate() {
  try {
    await fetch(`${API}/api/donations`, {
      method: "POST",
      headers: {
        "Content-Type":"application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        amount: document.getElementById("amount").value
      })
    });

    loadDonations();
  } catch {
    alert("Donation failed");
  }
}

// LOAD DONATIONS
async function loadDonations() {
  try {
    const res = await fetch(`${API}/api/donations`, {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const data = await res.json();
    const list = document.getElementById("donations");

    if (!Array.isArray(data)) {
      list.innerHTML = "Error loading donations";
      return;
    }

    if (data.length === 0) {
      list.innerHTML = "<li>No donations yet</li>";
      return;
    }

    list.innerHTML = "";
    data.forEach(d => {
      list.innerHTML += `<li>₹${d.amount}</li>`;
    });

  } catch {
    document.getElementById("donations").innerHTML = "Server error";
  }
}

// LOGOUT
function logout() {
  localStorage.removeItem("token");
  token = null;
  updateNav();
  showHome();
}

// INIT
updateNav();
showHome();
</script>

</body>
</html>
