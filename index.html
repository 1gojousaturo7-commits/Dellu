<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins';
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
padding:20px 50px;
align-items:center;
}

.navbar h2{
font-weight:600;
}

.navbar button{
margin-left:10px;
padding:8px 16px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
transition:0.3s;
}

.navbar button:hover{
background:#ff6b6b;
}

/* HERO */
.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:80px 60px;
}

.hero h1{
font-size:48px;
}

.hero p{
opacity:0.8;
margin:20px 0;
}

.cta{
padding:12px 25px;
background:#00c9a7;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

/* GLASS CARD */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:25px;
border-radius:20px;
box-shadow:0 8px 32px rgba(0,0,0,0.3);
margin:15px 0;
}

/* DONATE BOX */
.donate-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

.donate-box button{
width:100%;
padding:12px;
background:#ff6b6b;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px 60px;
}

/* SECTION */
.section{display:none;}
.active{display:block;}

/* DASHBOARD */
.history-item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

/* CHAT */
.chatbox{
position:fixed;
bottom:20px;
right:20px;
background:#1e1e1e;
padding:15px;
border-radius:15px;
width:260px;
}

.chatbox input{
width:100%;
padding:8px;
margin-bottom:8px;
}
</style>
</head>

<body>

<div class="navbar">
<h2>❤️ NGO</h2>
<div id="nav"></div>
</div>

<!-- HOME -->
<div id="home" class="section active">

<div class="hero">
<div>
<h1>Donate & Save Lives 🌍</h1>
<p>Every rupee creates impact. Help us provide food, shelter & hope.</p>
<button class="cta" onclick="show('login')">Get Started</button>
</div>

<div class="card donate-box">
<h3>Donate Now</h3>
<input id="amount" placeholder="Enter amount ₹">
<button onclick="donate()">Donate</button>
</div>
</div>

<div class="grid">

<div class="card">
<h3>Impact</h3>
<p id="impact"></p>
</div>

<div class="card">
<h3>Transparency</h3>
<div id="usage"></div>
</div>

<div class="card">
<h3>Events</h3>
<p>Food Drive • Clothes Camp • Blood Donation</p>
</div>

</div>

</div>

<!-- LOGIN -->
<div id="login" class="section">
<div class="card" style="max-width:400px;margin:50px auto;">
<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button class="cta" onclick="login()">Login</button>
</div>
</div>

<!-- SIGNUP -->
<div id="signup" class="section">
<div class="card" style="max-width:400px;margin:50px auto;">
<h2>Signup</h2>
<input id="signupEmail">
<input id="signupPass" type="password">
<button class="cta" onclick="signup()">Signup</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<div class="grid">

<div class="card">
<h3>Your Donations</h3>
<div id="history"></div>
</div>

<div class="card">
<h3>Your Badge</h3>
<p id="badge"></p>
</div>

<div class="card">
<h3>Volunteers</h3>
<input id="volName">
<button onclick="addVolunteer()">Join</button>
<p id="volCount"></p>
</div>

<div class="card">
<h3>Beneficiaries</h3>
<input id="benName">
<button onclick="addBeneficiary()">Add</button>
<div id="benList"></div>
</div>

</div>
</div>

<!-- CHAT -->
<div class="chatbox">
<input id="chatInput" placeholder="Ask something...">
<button onclick="chat()">Send</button>
<p id="chatOutput"></p>
</div>

<script>

function updateNav(){
let user=localStorage.getItem("user");
let nav=document.getElementById("nav");

if(user){
nav.innerHTML=`
<button onclick="show('home')">Home</button>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="logout()">Logout</button>`;
}else{
nav.innerHTML=`
<button onclick="show('home')">Home</button>
<button onclick="show('login')">Login</button>
<button onclick="show('signup')">Signup</button>`;
}
}

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
update();
}

function signup(){
let users=JSON.parse(localStorage.getItem("users"))||[];
users.push({email:signupEmail.value,pass:signupPass.value});
localStorage.setItem("users",JSON.stringify(users));
alert("Signup success");
show("login");
}

function login(){
let users=JSON.parse(localStorage.getItem("users"))||[];
let u=users.find(x=>x.email==loginEmail.value && x.pass==loginPass.value);
if(u){
localStorage.setItem("user",u.email);
updateNav();
show("dashboard");
}else alert("Invalid");
}

function logout(){
localStorage.removeItem("user");
updateNav();
show("home");
}

function donate(){
let user=localStorage.getItem("user");
if(!user) return alert("Login first");

let amt=Number(amount.value);
let data=JSON.parse(localStorage.getItem("donations"))||[];
data.push({user,amt});
localStorage.setItem("donations",JSON.stringify(data));
update();
}

function update(){
let user=localStorage.getItem("user");
let data=JSON.parse(localStorage.getItem("donations"))||[];

let userData=data.filter(d=>d.user==user);

history.innerHTML="";
userData.forEach(d=>{
history.innerHTML+=`<div class="history-item">₹${d.amt}</div>`;
});

let total=userData.reduce((s,d)=>s+d.amt,0);
badge.innerText= total>5000?"🥇 Gold": total>2000?"🥈 Silver":"🥉 Bronze";

impact.innerText=`₹${total} → ${Math.floor(total/100)} meals`;

usage.innerHTML="";
data.forEach(d=>{
usage.innerHTML+=`<div>₹${d.amt} → Food</div>`;
});

let vols=JSON.parse(localStorage.getItem("vols"))||[];
volCount.innerText="Volunteers: "+vols.length;

let bens=JSON.parse(localStorage.getItem("bens"))||[];
benList.innerHTML="";
bens.forEach(b=>benList.innerHTML+=`<div>${b}</div>`);
}

function addVolunteer(){
let vols=JSON.parse(localStorage.getItem("vols"))||[];
vols.push(volName.value);
localStorage.setItem("vols",JSON.stringify(vols));
update();
}

function addBeneficiary(){
let bens=JSON.parse(localStorage.getItem("bens"))||[];
bens.push(benName.value);
localStorage.setItem("bens",JSON.stringify(bens));
update();
}

function chat(){
let q=chatInput.value.toLowerCase();
if(q.includes("donate")) chatOutput.innerText="Use donate box!";
else chatOutput.innerText="We help NGOs manage impact.";
}

updateNav();
update();

</script>

</body>
</html>
