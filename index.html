<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NGO Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins';
  background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  width:220px;
  height:100vh;
  background:rgba(0,0,0,0.6);
  padding-top:20px;
  text-align:center;
}

.sidebar button {
  width:85%;
  margin:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff6b6b;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main {
  margin-left:220px;
  padding:40px;
}

.section { display:none; }
.active { display:block; }

/* GLASS EFFECT */
.glass {
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  margin-top:20px;
  backdrop-filter:blur(10px);
}

/* HERO */
.hero {
  display:flex;
  justify-content:space-between;
}

.hero h1 {
  font-size:40px;
  color:#ffb347;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

/* BUTTON */
button {
  padding:12px;
  background:#ff6b6b;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* CARDS */
.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card {
  padding:20px;
  border-radius:15px;
  background:linear-gradient(135deg,#ff6b6b,#f06595);
}

/* HISTORY */
.history-item {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="sidebar">
<h2>❤️ NGO</h2>
<button onclick="show('home')">Home</button>
<button onclick="show('login')">Login</button>
<button onclick="show('signup')">Signup</button>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<!-- HOME -->
<div id="home" class="section active">
<div class="hero">

<div>
<h1>Saving Lives, One Step at a Time 🌍</h1>
<p>Your small help can change someone's entire future.</p>
<button onclick="show('signup')">Join Us</button>
</div>

<div class="glass">
<h3>Impact</h3>
<p>Funds: ₹<span id="funds">0</span></p>
<p>Lives Saved: <span id="lives">0</span></p>
</div>

</div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="section">
<h2>Signup</h2>
<input id="signupEmail" placeholder="Email">
<input id="signupPass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">

<div class="glass">
<h3>Donate</h3>
<input id="amount" type="number" placeholder="Enter amount">
<button onclick="donate()">Donate</button>
</div>

<div class="glass">
<h3>Your Donations</h3>
<div id="history"></div>
</div>

</div>

</div>

<script>
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  update();
}

/* SIGNUP */
async function signup(){
  let res = await fetch("https://ngo-backend-5zc1.onrender.com/api/auth/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:signupEmail.value,
      password:signupPass.value
    })
  });

  alert("Account created!");
  show("login"); // ✅ redirect after signup
}

/* LOGIN */
async function login(){
  let res = await fetch("https://ngo-backend-5zc1.onrender.com/api/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:loginEmail.value,
      password:loginPass.value
    })
  });

  let data = await res.json();

  if(data.token){
    localStorage.setItem("token",data.token);
    show("dashboard");
  } else {
    alert("Login failed");
  }
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  alert("Logged out");
  show("home");
}

/* DONATE */
async function donate(){
  let token = localStorage.getItem("token");

  if(!token){
    alert("Login first!");
    show("login");
    return;
  }

  let res = await fetch("https://ngo-backend-5zc1.onrender.com/api/donations",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({
      amount:Number(amount.value)
    })
  });

  alert("Donation successful ❤️");
  update();
}

/* UPDATE UI */
async function update(){
  let res = await fetch("https://ngo-backend-5zc1.onrender.com/api/donations");
  let data = await res.json();

  let total = data.reduce((s,d)=>s+d.amount,0);
  funds.innerText = total;
  lives.innerText = Math.floor(total/500000);

  let token = localStorage.getItem("token");
  if(!token) return;

  history.innerHTML="";
  data.forEach(d=>{
    let div=document.createElement("div");
    div.className="history-item";
    div.innerHTML=`₹${d.amount}`;
    history.appendChild(div);
  });
}

update();
</script>

</body>
</html>
