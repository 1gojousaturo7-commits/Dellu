<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  --text: #1b5e20;
  --card: rgba(255,255,255,0.7);
}

.dark {
  --bg: #121212;
  --text: #ffffff;
  --card: rgba(255,255,255,0.08);
}

body {
  margin: 0;
  font-family: 'Poppins';
  background: var(--bg);
  color: var(--text);
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: var(--card);
  backdrop-filter: blur(10px);
}

nav button {
  margin-left: 10px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero button {
  background: #43a047;
  color: white;
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
}

/* SECTIONS */
.section { display:none; padding:40px; }
.active { display:block; }

/* GLASS */
.glass {
  background: var(--card);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  padding: 25px;
}

/* AUTH */
.auth-container {
  display:flex;
  justify-content:center;
  align-items:center;
  height:70vh;
}

.auth-box { width:350px; }

input {
  width:100%;
  margin:10px 0;
  padding:12px;
}

/* BUTTON */
button.main {
  width:100%;
  background:#43a047;
  color:white;
  padding:12px;
  border:none;
  border-radius:8px;
}

/* CARDS */
.cards {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card {
  padding:20px;
  border-radius:15px;
  color:white;
}

.card:nth-child(1){background:#43a047;}
.card:nth-child(2){background:#2e7d32;}
.card:nth-child(3){background:#66bb6a;}
.card:nth-child(4){background:#388e3c;}

/* PROGRESS */
.progress {
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar {
  height:20px;
  background:#43a047;
  width:0%;
}

/* LIST */
ul { list-style:none; padding:0; }

/* CAMPAIGNS */
.campaigns {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.campaign img {
  width:100%;
  height:150px;
  object-fit:cover;
}
</style>
</head>

<body>

<nav>
  <h2>NGO 🌿</h2>
  <div>
    <button onclick="show('home')">Home</button>
    <button onclick="show('login')">Login</button>
    <button onclick="show('signup')">Signup</button>
    <button onclick="toggleDark()">🌙</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <h1>Make a Difference 🌍</h1>
    <p>Together we build a greener future</p>
    <button onclick="show('signup')">Get Started</button>
  </div>

  <div class="campaigns">
    <div class="campaign">
      <img src="https://images.unsplash.com/photo-1524492412937-b28074a5d7da">
      <p>Clean Water Initiative</p>
    </div>

    <div class="campaign">
      <img src="https://images.unsplash.com/photo-1509099836639-18ba1795216d">
      <p>Education for All</p>
    </div>

    <div class="campaign">
      <img src="https://images.unsplash.com/photo-1606788075761-8a3b3d1a2f6c">
      <p>Food Donation Drive</p>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
  <div class="auth-container">
    <div class="glass auth-box">
      <h2>Welcome Back 🌿</h2>
      <input id="loginEmail" placeholder="Email">
      <input id="loginPass" type="password" placeholder="Password">
      <button class="main" onclick="login()">Login</button>
    </div>
  </div>
</div>

<!-- SIGNUP -->
<div id="signup" class="section">
  <div class="auth-container">
    <div class="glass auth-box">
      <h2>Create Account 🌱</h2>
      <input id="signupEmail" placeholder="Email">
      <input id="signupPass" type="password" placeholder="Password">
      <button class="main" onclick="signup()">Signup</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">

  <div class="cards">
    <div class="card"><h3 id="funds">₹0</h3><p>Funds</p></div>
    <div class="card"><h3 id="volunteers">120</h3><p>Volunteers</p></div>
    <div class="card"><h3>35</h3><p>Campaigns</p></div>
    <div class="card"><h3 id="lives">0</h3><p>Lives</p></div>
  </div>

  <div class="glass">
    <h3>🎯 Goal: 10,000 Lives</h3>
    <p id="goalText">0 / 10,000 Lives</p>
    <div class="progress">
      <div id="progressBar" class="progress-bar"></div>
    </div>
  </div>

  <div class="glass">
    <h3>💳 Donate</h3>
    <input id="donorName" placeholder="Name">
    <input id="donationAmount" type="number" placeholder="Amount">
    <button onclick="donate()">Donate</button>
  </div>

  <div class="glass">
    <h3>🏆 Top Donors</h3>
    <ul id="donorList"></ul>
  </div>

</div>

<script>
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

/* SIGNUP */
function signup(){
  let users=JSON.parse(localStorage.getItem("users"))||[];
  users.push({email:signupEmail.value,pass:signupPass.value});
  localStorage.setItem("users",JSON.stringify(users));
  alert("Account created!");
}

/* LOGIN */
function login(){
  let users=JSON.parse(localStorage.getItem("users"))||[];
  let user=users.find(u=>u.email==loginEmail.value && u.pass==loginPass.value);

  if(user){
    localStorage.setItem("loggedIn",true);
    show("dashboard");
    updateDashboard();
  } else alert("Invalid login");
}

function logout(){
  localStorage.removeItem("loggedIn");
  show("home");
}

/* DONATE */
function donate(){
  let name=donorName.value.trim();
  let amount=Number(donationAmount.value);

  if(!name || amount<=0) return alert("Enter valid details");

  let donations=JSON.parse(localStorage.getItem("donations"))||[];
  let volunteers=Number(localStorage.getItem("volunteers"))||120;

  donations.push({name,amount});
  volunteers++;

  localStorage.setItem("donations",JSON.stringify(donations));
  localStorage.setItem("volunteers",volunteers);

  updateDashboard();

  donorName.value="";
  donationAmount.value="";

  alert(`Thank you volunteer ${name} for your support ❤️`);
}

/* UPDATE */
function updateDashboard(){
  let donations=JSON.parse(localStorage.getItem("donations"))||[];
  let volunteers=Number(localStorage.getItem("volunteers"))||120;

  let total=donations.reduce((sum,d)=>sum+Number(d.amount||0),0);

  let livesCount=Math.floor(total/500000);
  let goal=10000;

  funds.innerText="₹"+total;
  document.getElementById("lives").innerText=livesCount;
  document.getElementById("volunteers").innerText=volunteers;

  let percent=Math.min((livesCount/goal)*100,100);
  progressBar.style.width=percent+"%";
  goalText.innerText=`${livesCount} / ${goal} Lives`;

  let sorted=[...donations].sort((a,b)=>b.amount-a.amount);
  donorList.innerHTML="";
  sorted.slice(0,5).forEach(d=>{
    let li=document.createElement("li");
    li.innerText=`${d.name} - ₹${d.amount}`;
    donorList.appendChild(li);
  });
}

if(localStorage.getItem("loggedIn")){
  show("dashboard");
  updateDashboard();
}
</script>

</body>
</html>
