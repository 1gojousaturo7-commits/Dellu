<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins';
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(0,0,0,0.3);
}
.nav button {
  margin-left:10px;
}

/* SECTIONS */
.section {display:none;}
.active {display:block;}

/* HERO */
.hero {
  padding:80px;
  text-align:left;
}
.hero h1 {
  font-size:48px;
}
.hero button {
  margin-top:20px;
}

/* CARD */
.glass {
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  margin:20px;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin:10px 0;
}

/* BUTTON */
button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  cursor:pointer;
}

/* HISTORY */
.history-item {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <h2>🌿 NGO</h2>
  <div>
    <button onclick="show('home')">Home</button>
    <button onclick="show('login')" id="loginBtn">Login</button>
    <button onclick="show('signup')" id="signupBtn">Signup</button>
    <button onclick="show('dashboard')" id="dashBtn" style="display:none;">Dashboard</button>
    <button onclick="logout()" id="logoutBtn" style="display:none;">Logout</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <h1>Donate & Save Lives 🌍</h1>
    <p>Your small help can change someone’s future</p>
    <button onclick="show('signup')">Start Helping</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
  <div class="glass">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- SIGNUP -->
<div id="signup" class="section">
  <div class="glass">
    <h2>Signup</h2>
    <input id="signupEmail" placeholder="Email">
    <input id="signupPass" type="password" placeholder="Password">
    <button onclick="signup()">Signup</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
  
  <div class="glass">
    <h2>Donate</h2>
    <input id="donationAmount" type="number" placeholder="Enter amount">
    <button onclick="donate()">Donate</button>
  </div>

  <div class="glass">
    <h2>Your Donations</h2>
    <div id="userDonations"></div>
  </div>

</div>

<script>
const API = "https://ngo-backend-5zc1.onrender.com/api";

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* AUTH UI CONTROL */
function updateUI(){
  let token = localStorage.getItem("token");

  document.getElementById("loginBtn").style.display = token ? "none":"inline-block";
  document.getElementById("signupBtn").style.display = token ? "none":"inline-block";
  document.getElementById("dashBtn").style.display = token ? "inline-block":"none";
  document.getElementById("logoutBtn").style.display = token ? "inline-block":"none";
}

/* SIGNUP */
async function signup(){
  let res = await fetch(API+"/auth/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:signupEmail.value,
      password:signupPass.value
    })
  });

  let data = await res.json();
  alert(data.message || "Signup done");

  show("login"); // redirect to login
}

/* LOGIN */
async function login(){
  let res = await fetch(API+"/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:loginEmail.value,
      password:loginPass.value
    })
  });

  let data = await res.json();

  if(data.token){
    localStorage.setItem("token",data.token);
    updateUI();
    show("dashboard");
    loadDonations();
  } else {
    alert("Login failed");
  }
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  updateUI();
  show("home");
}

/* DONATE */
async function donate(){
  let token = localStorage.getItem("token");

  if(!token){
    alert("Login first");
    show("login");
    return;
  }

  let amount = Number(donationAmount.value);

  await fetch(API+"/donations",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({amount})
  });

  alert("Donation successful ❤️");
  loadDonations();
}

/* LOAD USER DONATIONS */
async function loadDonations(){
  let token = localStorage.getItem("token");

  let res = await fetch(API+"/donations/my",{
    headers:{
      "Authorization":"Bearer "+token
    }
  });

  let data = await res.json();

  let container = document.getElementById("userDonations");
  container.innerHTML="";

  data.forEach(d=>{
    let div=document.createElement("div");
    div.className="history-item";
    div.innerHTML=`<span>₹${d.amount}</span><span>${new Date(d.date).toLocaleDateString()}</span>`;
    container.appendChild(div);
  });
}

/* INIT */
updateUI();
</script>

</body>
</html>
