<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crazy Coders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
  perspective: 1000px;
}

:root {
  --bg:#0f2027;
  --text:white;
  --card:rgba(255,255,255,0.08);
}

.light {
  --bg:#fff3e0;
  --text:#5d4037;
  --card:#ffffff;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 50px;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.nav-right {
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-right button {
  padding:10px 18px;
  border-radius:25px;
  border:none;
  font-weight:600;
  background:linear-gradient(45deg,#ff6b6b,#ff8e53);
  color:white;
  transition:0.3s;
}

.nav-right button:hover {
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 8px 20px rgba(255,107,107,0.4);
}

#profile {
  display:none;
  padding:8px 12px;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
}

/* CONTAINER */
.container {padding:60px;text-align:center;}

/* HERO */
.hero {
  margin-top:60px;
}

.hero h1 {
  font-size:60px;
  background:linear-gradient(45deg,#ff6b6b,#ffd166);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p {
  margin-top:15px;
  font-size:18px;
  color:#ccc;
}

.hero button {
  margin-top:25px;
  padding:14px 28px;
  font-size:16px;
  border-radius:30px;
  background:linear-gradient(45deg,#ff6b6b,#ff8e53);
}

/* FEATURES */
.features {
  margin-top:80px;
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.feature-card {
  background:var(--card);
  padding:25px;
  width:250px;
  border-radius:15px;
  transition:0.3s;
}

.feature-card:hover {
  transform:translateY(-10px) scale(1.05);
}

/* DASH */
.dash-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.dash-card {
  background:var(--card);
  padding:25px;
  border-radius:15px;
  width:250px;
}

input {
  padding:10px;
  width:90%;
  border-radius:8px;
  border:none;
  margin:5px;
}

ul {list-style:none;}
ul li {
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
}

/* CHAT */
#chatbox {
  position:fixed;
  bottom:20px;
  right:20px;
  width:260px;
  background:var(--card);
  border-radius:12px;
}

#chatheader {
  background:#ff6b6b;
  padding:10px;
  cursor:pointer;
}

#chatbody {display:none;padding:10px;}
#chatlog {height:150px;overflow:auto;font-size:13px;}
</style>
</head>

<body>

<header>
  <h2>🚀 Crazy Coders</h2>

  <div class="nav-right">
    <span id="profile"></span>

    <button onclick="showHome()">Home</button>
    <button id="loginBtn" onclick="showLogin()">Login</button>
    <button id="signupBtn" onclick="showSignup()">Signup</button>
    <button id="dashboardBtn" onclick="showDashboard()" style="display:none;">Dashboard</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
    <button onclick="toggleTheme()">🌗</button>
  </div>
</header>

<div class="container" id="app"></div>

<!-- CHAT -->
<div id="chatbox">
  <div id="chatheader" onclick="toggleChat()">💬 Help</div>
  <div id="chatbody">
    <div id="chatlog"></div>
    <input id="chatInput">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const API="https://ngo-backend-5zc1.onrender.com";
let token=localStorage.getItem("token");

function toggleTheme(){document.body.classList.toggle("light");}

/* NAV */
function updateNav(){
  let email = localStorage.getItem("email");

  if(token){
    loginBtn.style.display="none";
    signupBtn.style.display="none";
    dashboardBtn.style.display="inline";
    logoutBtn.style.display="inline";

    let username = email ? email.split("@")[0] : "User";
    profile.style.display="inline";
    profile.innerText="👤 " + username;

  } else {
    loginBtn.style.display="inline";
    signupBtn.style.display="inline";
    dashboardBtn.style.display="none";
    logoutBtn.style.display="none";
    profile.style.display="none";
  }
}

/* HOME */
function showHome(){
  app.innerHTML = `
  <div class="hero">
    <h1>🌍 Empower NGOs</h1>
    <p>Track Donations • Ensure Transparency • Make Real Impact</p>
    <button onclick="showLogin()">Get Started 🚀</button>
  </div>

  <div class="features">
    <div class="feature-card">
      <h3>💰 Donations</h3>
      <p>Secure and transparent contribution tracking</p>
    </div>

    <div class="feature-card">
      <h3>📊 Analytics</h3>
      <p>Real-time insights on impact and funds</p>
    </div>

    <div class="feature-card">
      <h3>🤝 Volunteers</h3>
      <p>Manage and connect with volunteers easily</p>
    </div>
  </div>`;
}

/* LOGIN */
function showLogin(){
  app.innerHTML=`
  <div class="dash-card">
    <h2>Login</h2>
    <input id="email"><br>
    <input id="password" type="password"><br>
    <button onclick="login()">Login</button>
  </div>`;
}

async function login(){
  const res=await fetch(API+"/api/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });

  const data=await res.json();

  if(data.token){
    token=data.token;
    localStorage.setItem("token",token);
    localStorage.setItem("email", email.value);
    updateNav();
    showDashboard();
  }
}

/* SIGNUP */
function showSignup(){
  app.innerHTML=`
  <div class="dash-card">
    <h2>Signup</h2>
    <input id="email"><br>
    <input id="password" type="password"><br>
    <button onclick="signup()">Signup</button>
  </div>`;
}

async function signup(){
  await fetch(API+"/api/auth/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });
  alert("Signup done");
  showLogin();
}

/* DASHBOARD (unchanged) */
function showDashboard(){
  app.innerHTML=`
  <h1>📊 Dashboard</h1>

  <div class="dash-container">
    <div class="dash-card">
      <h3>💰 Donate</h3>
      <input id="amount" placeholder="Enter amount">
      <button onclick="donate()">Donate</button>
    </div>
  </div>

  <div style="max-width:600px;margin:40px auto;">
    <div class="dash-card">
      <h3>📜 Donation History</h3>
      <ul id="donations"></ul>
    </div>
  </div>
  `;

  loadDonations();
}

/* KEEP YOUR EXISTING LOGIC BELOW (unchanged) */
</script>

</body>
</html>
