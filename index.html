<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* 🌿 GREEN THEME BACKGROUND */
body {
  background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  color: #2e3d2f;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #c8e6c9;
}

nav h2 {
  color: #2e7d32;
}

nav button {
  margin-left: 10px;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  background: #a5d6a7;
}

nav button:hover {
  background: #81c784;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 3rem;
  color: #1b5e20;
}

.hero p {
  color: #4e6b50;
  margin: 10px 0 20px;
}

.hero button {
  background: #43a047;
  color: white;
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
}

/* SECTIONS */
.section {
  display: none;
  padding: 40px;
}

.active {
  display: block;
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 25px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

/* FORM */
.form {
  max-width: 350px;
  margin: auto;
}

input {
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c8e6c9;
}

/* BUTTON */
button.main {
  width: 100%;
  background: #43a047;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 8px;
}

/* DASHBOARD */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

.card {
  padding: 20px;
  border-radius: 15px;
  color: white;
}

.card:nth-child(1){background:#43a047;}
.card:nth-child(2){background:#2e7d32;}
.card:nth-child(3){background:#66bb6a;}
.card:nth-child(4){background:#388e3c;}

/* CAMPAIGNS */
.campaigns {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  margin-top: 40px;
}

.campaign {
  background: white;
  border-radius: 12px;
  overflow: hidden;
}

.campaign img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.campaign p {
  padding: 10px;
}

/* DONOR LIST */
ul {
  list-style: none;
  padding: 0;
}

li {
  padding: 10px;
  border-bottom: 1px solid #e0e0e0;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #4e6b50;
}
</style>
</head>

<body>

<nav>
  <h2>NGO 🌿</h2>
  <div>
    <button onclick="show('home')">Home</button>
    <button onclick="show('login')">Login</button>
    <button onclick="show('signup')">Signup</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <h1>Make a Difference 🌍</h1>
    <p>Together we build a greener and better future</p>
    <button onclick="show('signup')">Get Started</button>
  </div>

  <div class="campaigns">
    <div class="campaign">
      <img src="https://images.unsplash.com/photo-1524492412937-b28074a5d7da">
      <p>Clean Water Initiative</p>
    </div>

    <div class="campaign">
      <img src="https://images.unsplash.com/photo-1509099836639-18ba1795216d">
      <p>Education for All</p>
    </div>

    <div class="campaign">
      <img src="https://images.unsplash.com/photo-1469571486292-b53601020a5f">
      <p>Food Donation Drive</p>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
  <div class="glass form">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="main" onclick="login()">Login</button>
  </div>
</div>

<!-- SIGNUP -->
<div id="signup" class="section">
  <div class="glass form">
    <h2>Signup</h2>
    <input id="signupEmail" placeholder="Email">
    <input id="signupPass" type="password" placeholder="Password">
    <button class="main" onclick="signup()">Signup</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
  <h2>Dashboard 🌿</h2>

  <div class="cards">
    <div class="card"><h3 id="funds">₹0</h3><p>Funds Raised</p></div>
    <div class="card"><h3>120</h3><p>Volunteers</p></div>
    <div class="card"><h3>35</h3><p>Campaigns</p></div>
    <div class="card"><h3 id="lives">0</h3><p>Lives Impacted</p></div>
  </div>

  <!-- Donation -->
  <div class="glass" style="margin-top:30px;">
    <h3>💳 Donate to NGO</h3>
    <input id="donorName" placeholder="Your Name">
    <input id="donationAmount" type="number" placeholder="Amount (₹)">
    <button class="main" onclick="donate()">Donate</button>
  </div>

  <!-- Donors -->
  <div class="glass" style="margin-top:30px;">
    <h3>❤️ Recent Donors</h3>
    <ul id="donorList"></ul>
  </div>
</div>

<footer>
  © 2026 NGO Platform 🌿
</footer>

<script>
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* Signup */
function signup(){
  let email=document.getElementById("signupEmail").value;
  let pass=document.getElementById("signupPass").value;

  let users=JSON.parse(localStorage.getItem("users"))||[];
  users.push({email,pass});
  localStorage.setItem("users",JSON.stringify(users));

  alert("Account created!");
  show("login");
}

/* Login */
function login(){
  let email=document.getElementById("loginEmail").value;
  let pass=document.getElementById("loginPass").value;

  let users=JSON.parse(localStorage.getItem("users"))||[];
  let user=users.find(u=>u.email===email && u.pass===pass);

  if(user){
    localStorage.setItem("loggedIn",true);
    show("dashboard");
    updateDashboard();
  } else alert("Invalid login");
}

/* Logout */
function logout(){
  localStorage.removeItem("loggedIn");
  show("home");
}

/* FIXED DONATION LOGIC */
function donate(){
  let name=document.getElementById("donorName").value.trim();
  let amount=Number(document.getElementById("donationAmount").value);

  if(!name || isNaN(amount) || amount <= 0){
    alert("Enter valid name and amount");
    return;
  }

  let donations=JSON.parse(localStorage.getItem("donations"))||[];

  donations.push({
    name:name,
    amount:amount
  });

  localStorage.setItem("donations",JSON.stringify(donations));

  updateDashboard();

  document.getElementById("donorName").value="";
  document.getElementById("donationAmount").value="";

  alert("Thank you for your support ❤️");
}

/* UPDATE DASHBOARD */
function updateDashboard(){
  let donations=JSON.parse(localStorage.getItem("donations"))||[];

  let total = 0;
  donations.forEach(d => {
    total += Number(d.amount) || 0;
  });

  let lives = Math.floor(total / 100);

  document.getElementById("funds").innerText = "₹" + total;
  document.getElementById("lives").innerText = lives;

  let list=document.getElementById("donorList");
  list.innerHTML="";

  donations.slice().reverse().forEach(d=>{
    let li=document.createElement("li");
    li.innerText=`${d.name} donated ₹${d.amount}`;
    list.appendChild(li);
  });
}

/* Auto Login */
if(localStorage.getItem("loggedIn")){
  show("dashboard");
  updateDashboard();
}
</script>

</body>
</html>
