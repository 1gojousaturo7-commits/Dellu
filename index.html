<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  --text: #1b5e20;
  --card: rgba(255,255,255,0.85);
}

.dark {
  --bg: #121212;
  --text: #ffffff;
  --card: rgba(255,255,255,0.08);
}

body {
  margin:0;
  font-family:'Poppins';
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  top:0;
  left:0;
  width:220px;
  height:100vh;
  background:rgba(0,0,0,0.05);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
  gap:15px;
  animation: slideIn 0.6s ease;
}

.sidebar button {
  width:85%;
  padding:12px;
  background:#43a047;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
  justify-content:center;
  transition:0.3s;
}

.sidebar button:hover {
  background:#2e7d32;
  transform:scale(1.07);
  box-shadow:0 0 10px #43a047;
}

/* MAIN */
.main {
  margin-left:220px;
  padding:40px;
}

/* SECTIONS */
.section {
  display:none;
  opacity:0;
  transform:translateY(20px);
  transition:0.4s;
}

.active {
  display:block;
  opacity:1;
  transform:translateY(0);
}

/* GLASS */
.glass {
  background:var(--card);
  padding:20px;
  border-radius:15px;
  margin-top:20px;
  transition:0.3s;
}

.glass:hover {
  transform:translateY(-5px);
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

/* PASSWORD */
.pass-box {
  position:relative;
}
.pass-box span {
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

/* BUTTON */
button {
  padding:12px;
  background:#43a047;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
  box-shadow:0 0 10px #43a047;
}

/* DASHBOARD */
.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card {
  padding:20px;
  border-radius:15px;
  color:white;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-8px);
}

.card:nth-child(1){background:#43a047;}
.card:nth-child(2){background:#2e7d32;}
.card:nth-child(3){background:#66bb6a;}

/* PROGRESS */
.progress {
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar {
  height:20px;
  background:#43a047;
  width:0%;
  transition:1s ease;
}

/* HISTORY */
.history-item {
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid #ccc;
  transition:0.3s;
}

.history-item:hover {
  background:rgba(0,0,0,0.05);
  transform:scale(1.02);
}

/* DONOR COLORS */
.gold { color:gold; }
.silver { color:silver; }
.bronze { color:#cd7f32; }

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}
@keyframes slideIn {
  from {transform:translateX(-100%);}
  to {transform:translateX(0);}
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🌿 NGO</h2>
  <button onclick="show('home')"><i class="fas fa-home"></i> Home</button>
  <button onclick="show('login')"><i class="fas fa-sign-in-alt"></i> Login</button>
  <button onclick="show('signup')"><i class="fas fa-user-plus"></i> Signup</button>
  <button onclick="show('profile')"><i class="fas fa-user"></i> Profile</button>
  <button onclick="toggleDark()"><i class="fas fa-moon"></i> Dark</button>
</div>

<div class="main">

<!-- HOME -->
<div id="home" class="section active">
<h1>Make a Difference 🌍</h1>
</div>

<!-- LOGIN -->
<div id="login" class="section">
<div class="glass">
<h2>Login</h2>
<input id="loginEmail" placeholder="Username">
<div class="pass-box">
<input id="loginPass" type="password" placeholder="Password">
<span onclick="togglePass('loginPass')">👁️</span>
</div>
<button onclick="login()">Login</button>
</div>
</div>

<!-- SIGNUP -->
<div id="signup" class="section">
<div class="glass">
<h2>Signup</h2>
<input id="signupEmail" placeholder="Username">
<div class="pass-box">
<input id="signupPass" type="password" placeholder="Password">
<span onclick="togglePass('signupPass')">👁️</span>
</div>
<button onclick="signup()">Signup</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">

<div class="cards">
<div class="card"><h3 id="funds">₹0</h3><p>Funds</p></div>
<div class="card"><h3 id="volunteers">120</h3><p>Volunteers</p></div>
<div class="card"><h3 id="lives">0</h3><p>Lives</p></div>
</div>

<div class="glass">
<h3>Donate</h3>
<input id="donorName" placeholder="Name">
<input id="donationAmount" type="number" placeholder="Amount">
<button onclick="donate()">Donate</button>
</div>

<div class="glass">
<h3>Donation History</h3>
<div id="history"></div>
</div>

</div>

<!-- PROFILE (UPDATED 🔥) -->
<div id="profile" class="section">

<div class="glass">
<h2>👤 Profile</h2>
<p><strong>Username:</strong> <span id="profileName"></span></p>

<div class="cards">
  <div class="card">
    <h3 id="userTotal">₹0</h3>
    <p>Your Donations</p>
  </div>
  <div class="card">
    <h3 id="userLives">0</h3>
    <p>Lives Saved</p>
  </div>
</div>
</div>

<div class="glass">
<h3>📜 Your Donation History</h3>
<div id="userHistory"></div>
</div>

</div>

</div>

<script>
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  update();
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function togglePass(id){
  let input=document.getElementById(id);
  input.type=input.type==="password"?"text":"password";
}

function signup(){
  let users=JSON.parse(localStorage.getItem("users"))||[];
  users.push({email:signupEmail.value,pass:signupPass.value});
  localStorage.setItem("users",JSON.stringify(users));
  alert("Account created!");
}

function login(){
  let users=JSON.parse(localStorage.getItem("users"))||[];
  let u=users.find(x=>x.email==loginEmail.value && x.pass==loginPass.value);
  if(u){
    localStorage.setItem("currentUser",u.email);
    show("dashboard");
  } else alert("Invalid login");
}

function donate(){
  let name = localStorage.getItem("currentUser") || donorName.value.trim();
  let amount=Number(donationAmount.value);

  if(!name || isNaN(amount) || amount<=0) return alert("Enter valid details");

  let data=JSON.parse(localStorage.getItem("donations"))||[];
  let volunteers=Number(localStorage.getItem("volunteers"))||120;

  data.push({name,amount});
  volunteers++;

  localStorage.setItem("donations",JSON.stringify(data));
  localStorage.setItem("volunteers",volunteers);

  alert(`Thank you ${name} ❤️`);
  update();
}

function update(){
  let data=JSON.parse(localStorage.getItem("donations"))||[];
  let volunteers=Number(localStorage.getItem("volunteers"))||120;

  let total=data.reduce((s,d)=>s+Number(d.amount||0),0);
  let lives=Math.floor(total/500000);

  funds.innerText="₹"+total.toLocaleString();
  document.getElementById("lives").innerText=lives;
  document.getElementById("volunteers").innerText=volunteers;

  let history=document.getElementById("history");
  history.innerHTML="";
  data.slice().reverse().forEach(d=>{
    let div=document.createElement("div");
    div.className="history-item";
    div.innerHTML=`
      <span>${d.name}</span>
      <span>₹${Number(d.amount).toLocaleString()}</span>
    `;
    history.appendChild(div);
  });

  // PROFILE LOGIC
  let user = localStorage.getItem("currentUser") || "Guest";
  profileName.innerText = user;

  let userData = data.filter(d => d.name === user);
  let userTotalAmount = userData.reduce((s,d)=>s+Number(d.amount||0),0);
  let userLivesCount = Math.floor(userTotalAmount / 500000);

  document.getElementById("userTotal").innerText = "₹" + userTotalAmount.toLocaleString();
  document.getElementById("userLives").innerText = userLivesCount;

  let userHistory = document.getElementById("userHistory");
  userHistory.innerHTML="";

  userData.slice().reverse().forEach(d=>{
    let div=document.createElement("div");
    div.className="history-item";
    div.innerHTML=`
      <span>${d.name}</span>
      <span>₹${Number(d.amount).toLocaleString()}</span>
    `;
    userHistory.appendChild(div);
  });
}

update();
</script>

</body>
</html>
