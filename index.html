<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NGO Impact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* THEME */
body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

:root {
  --bg: #0f2027;
  --text: white;
  --card: rgba(255,255,255,0.08);
}

.light {
  --bg: #f5f5f5;
  --text: #111;
  --card: #ffffff;
}

/* NAV */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(0,0,0,0.3);
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 20px;
  background: #ff6b6b;
  color: white;
  cursor: pointer;
  margin-left: 10px;
}

button:hover {
  background: #ff3b3b;
}

/* CONTAINER */
.container {
  padding: 60px;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 60px;
}

.hero h1 {
  font-size: 48px;
}

/* CARD */
.card {
  background: var(--card);
  padding: 25px;
  margin-top: 20px;
  border-radius: 15px;
}

/* INPUT */
input {
  padding: 10px;
  width: 220px;
  border-radius: 8px;
  border: none;
  margin: 5px;
}

/* LIST */
ul {
  list-style: none;
}

ul li {
  background: rgba(255,255,255,0.05);
  margin: 8px 0;
  padding: 10px;
  border-radius: 8px;
}

/* CHATBOX */
#chatbox {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 260px;
  background: var(--card);
  border-radius: 12px;
  overflow: hidden;
}

#chatheader {
  background: #ff6b6b;
  padding: 10px;
  cursor: pointer;
}

#chatbody {
  display: none;
  padding: 10px;
}

#chatlog {
  height: 150px;
  overflow-y: auto;
  font-size: 13px;
  margin-bottom: 5px;
}

.msg-user {
  text-align: right;
  margin: 5px;
}

.msg-bot {
  text-align: left;
  margin: 5px;
}
</style>
</head>

<body>

<header>
  <h2>❤️ NGO Impact</h2>
  <div>
    <button onclick="showHome()">Home</button>
    <button id="loginBtn" onclick="showLogin()">Login</button>
    <button id="signupBtn" onclick="showSignup()">Signup</button>
    <button id="dashboardBtn" onclick="showDashboard()" style="display:none;">Dashboard</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
    <button onclick="toggleTheme()">🌗</button>
  </div>
</header>

<div class="container" id="app"></div>

<!-- CHATBOX -->
<div id="chatbox">
  <div id="chatheader" onclick="toggleChat()">💬 Assistant</div>
  <div id="chatbody">
    <div id="chatlog"></div>
    <input id="chatInput" placeholder="Ask something...">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const API = "https://ngo-backend-5zc1.onrender.com";
let token = localStorage.getItem("token");

const loginBtn = document.getElementById("loginBtn");
const signupBtn = document.getElementById("signupBtn");
const dashboardBtn = document.getElementById("dashboardBtn");
const logoutBtn = document.getElementById("logoutBtn");
const app = document.getElementById("app");

// THEME
function toggleTheme(){
  document.body.classList.toggle("light");
}

// NAV
function updateNav() {
  if (token) {
    loginBtn.style.display = "none";
    signupBtn.style.display = "none";
    dashboardBtn.style.display = "inline-block";
    logoutBtn.style.display = "inline-block";
  } else {
    loginBtn.style.display = "inline-block";
    signupBtn.style.display = "inline-block";
    dashboardBtn.style.display = "none";
    logoutBtn.style.display = "none";
  }
}

// HOME
function showHome() {
  app.innerHTML = `
    <div class="hero">
      <h1>Donate & Save Lives 🌍</h1>
      <p>Support NGOs and create real impact</p>
      <button onclick="showLogin()">Get Started</button>
    </div>

    <div class="card">
      <h3>Impact</h3>
      <p>₹500 = Feeds 5 people</p>
      <p>₹1000 = Educates a child</p>
      <p>₹2000 = Medical support</p>
    </div>
  `;
}

// LOGIN
function showLogin() {
  app.innerHTML = `
    <div class="card">
      <h2>Login</h2>
      <input id="email" placeholder="Email"><br>
      <input id="password" type="password" placeholder="Password"><br>
      <button onclick="login()">Login</button>
    </div>
  `;
}

async function login() {
  const res = await fetch(`${API}/api/auth/login`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();

  if (data.token) {
    token = data.token;
    localStorage.setItem("token", token);
    updateNav();
    showDashboard();
  } else alert("Login failed");
}

// SIGNUP
function showSignup() {
  app.innerHTML = `
    <div class="card">
      <h2>Signup</h2>
      <input id="email" placeholder="Email"><br>
      <input id="password" type="password" placeholder="Password"><br>
      <button onclick="signup()">Signup</button>
    </div>
  `;
}

async function signup() {
  await fetch(`${API}/api/auth/signup`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  alert("Signup successful");
  showLogin();
}

// DASHBOARD
function showDashboard() {
  if (!token) return showLogin();

  app.innerHTML = `
    <h2>Dashboard</h2>

    <div class="card">
      <h3>💰 Donate</h3>
      <input id="amount" placeholder="Enter amount">
      <button onclick="donate()">Donate</button>
    </div>

    <div class="card">
      <h3>📊 Summary</h3>
      <p>Total Donations: ₹<span id="total">0</span></p>
    </div>

    <div class="card">
      <h3>📜 Your Donations</h3>
      <ul id="donations">Loading...</ul>
    </div>
  `;

  loadDonations();
}

// DONATE
async function donate() {
  await fetch(`${API}/api/donations`, {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      amount: document.getElementById("amount").value
    })
  });

  loadDonations();
}

// LOAD DONATIONS
async function loadDonations() {
  const res = await fetch(`${API}/api/donations`, {
    headers: {"Authorization": "Bearer " + token}
  });

  const data = await res.json();
  const list = document.getElementById("donations");

  let total = 0;
  list.innerHTML = "";

  data.slice().reverse().forEach(d => {
    total += Number(d.amount);
    list.innerHTML += `<li>💸 ₹${d.amount}</li>`;
  });

  document.getElementById("total").innerText = total;
}

// LOGOUT
function logout() {
  localStorage.removeItem("token");
  token = null;
  updateNav();
  showHome();
}

// CHATBOX
function toggleChat(){
  let body = document.getElementById("chatbody");
  body.style.display = body.style.display === "none" ? "block" : "none";
}

function sendMsg(){
  let input = document.getElementById("chatInput");
  let msg = input.value.toLowerCase();
  let log = document.getElementById("chatlog");

  log.innerHTML += `<div class="msg-user">🧑 ${msg}</div>`;

  let reply = "Try asking about donations, NGOs or how the site works.";

  if(msg.includes("donation"))
    reply = "You can donate from dashboard and track all transactions.";
  else if(msg.includes("money"))
    reply = "Funds go towards food, education and healthcare.";
  else if(msg.includes("how"))
    reply = "Signup → Login → Donate → Track history.";
  else if(msg.includes("ngo"))
    reply = "NGOs are organizations helping communities in need.";

  log.innerHTML += `<div class="msg-bot">🤖 ${reply}</div>`;
  input.value = "";
}

// INIT
updateNav();
showHome();
</script>

</body>
</html>
