<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* NAVBAR */
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.nav button {
  margin-left:10px;
  padding:8px 15px;
  border:none;
  border-radius:8px;
  background:#ff6b6b;
  color:white;
  cursor:pointer;
}

/* HERO */
.hero {
  display:flex;
  justify-content:space-between;
  padding:50px;
}

.glass {
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

/* BUTTON */
.btn {
  background:#00c9a7;
  padding:10px;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* SECTION */
.section { display:none; }
.active { display:block; }

/* DASHBOARD */
.card {
  margin:20px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
}

/* HISTORY */
.history-item {
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="nav">
  <h2>❤️ NGO</h2>
  <div>
    <button onclick="show('home')">Home</button>
    <button id="loginBtn" onclick="show('login')">Login</button>
    <button id="signupBtn" onclick="show('signup')">Signup</button>
    <button id="dashboardBtn" onclick="show('dashboard')" style="display:none;">Dashboard</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <div>
      <h1>Donate & Save Lives 🌍</h1>
      <p>Help provide food, shelter & hope</p>
      <button class="btn" onclick="show('signup')">Get Started</button>
    </div>

    <div class="glass">
      <h3>Donate Now</h3>
      <input id="donationAmount" placeholder="Enter amount">
      <button class="btn" onclick="donate()">Donate</button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
  <div class="card">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<!-- SIGNUP -->
<div id="signup" class="section">
  <div class="card">
    <h2>Signup</h2>
    <input id="signupEmail" placeholder="Email">
    <input id="signupPass" type="password" placeholder="Password">
    <button class="btn" onclick="signup()">Signup</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">

  <div class="card">
    <h2>Your Badge 🏆</h2>
    <h3 id="badge">Loading...</h3>
  </div>

  <div class="card">
    <h2>Your Donations</h2>
    <div id="userDonations"></div>
  </div>

</div>

<script>
const API = "https://ngo-backend-5zc1.onrender.com/api";

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* AUTH */

async function signup(){
  const email = signupEmail.value;
  const password = signupPass.value;

  const res = await fetch(API+"/auth/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  });

  alert("Signup successful");
  show("login");
}

async function login(){
  const email = loginEmail.value;
  const password = loginPass.value;

  const res = await fetch(API+"/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  });

  const data = await res.json();

  localStorage.setItem("token",data.token);
  localStorage.setItem("user",email);

  updateUI();
  show("dashboard");
  loadUserData();
}

function logout(){
  localStorage.clear();
  updateUI();
  show("home");
}

/* UI CONTROL */

function updateUI(){
  const token = localStorage.getItem("token");

  loginBtn.style.display = token ? "none" : "inline-block";
  signupBtn.style.display = token ? "none" : "inline-block";
  dashboardBtn.style.display = token ? "inline-block" : "none";
  logoutBtn.style.display = token ? "inline-block" : "none";
}

/* DONATE */

async function donate(){
  const token = localStorage.getItem("token");
  const amount = Number(donationAmount.value);

  if(!token) return alert("Login first");
  if(amount<=0) return alert("Invalid amount");

  await fetch(API+"/donations",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({amount})
  });

  alert("Donation successful ❤️");
  loadUserData();
}

/* LOAD USER DATA */

async function loadUserData(){
  const token = localStorage.getItem("token");
  if(!token) return;

  const res = await fetch(API+"/donations",{
    headers:{
      "Authorization":"Bearer "+token
    }
  });

  const data = await res.json();

  const container = document.getElementById("userDonations");
  container.innerHTML="";

  let total=0;

  data.forEach(d=>{
    total+=d.amount;

    const div=document.createElement("div");
    div.className="history-item";
    div.innerHTML=`<span>₹${d.amount}</span>`;
    container.appendChild(div);
  });

  updateBadge(total);
}

/* BADGE */

function updateBadge(total){
  let badge="🌱 Beginner";

  if(total>5000) badge="🥉 Bronze";
  if(total>20000) badge="🥈 Silver";
  if(total>50000) badge="🥇 Gold";

  document.getElementById("badge").innerText=badge;
}

/* INIT */
updateUI();
</script>

</body>
</html>
