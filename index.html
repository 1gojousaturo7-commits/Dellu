<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NGO Impact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

:root {
  --bg:#0f2027;
  --text:white;
  --card:rgba(255,255,255,0.08);
}

.light {
  --bg:#f5f5f5;
  --text:#111;
  --card:#fff;
}

/* NAV */
header {
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}

button {
  padding:10px 16px;
  border:none;
  border-radius:20px;
  background:#ff6b6b;
  color:white;
  cursor:pointer;
  transition:0.2s;
}
button:hover {transform:scale(1.05);background:#ff3b3b;}

.container {padding:60px;}

/* HERO */
.hero {text-align:center;margin-top:60px;}
.hero h1 {font-size:50px;margin-bottom:10px;}
.hero p {color:#ccc;margin-bottom:20px;}

/* CARDS */
.card {
  background:var(--card);
  padding:25px;
  margin-top:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  transition:0.3s;
}
.card:hover {transform:translateY(-5px);}

/* INPUT */
input {
  padding:10px;
  width:220px;
  border-radius:8px;
  border:none;
  margin:5px;
}

/* LIST */
ul {list-style:none;}
ul li {
  background:rgba(255,255,255,0.05);
  margin:8px 0;
  padding:10px;
  border-radius:8px;
}

/* CHAT */
#chatbox {
  position:fixed;
  bottom:20px;
  right:20px;
  width:270px;
  border-radius:12px;
  overflow:hidden;
  background:var(--card);
}

#chatheader {
  background:#ff6b6b;
  padding:10px;
  cursor:pointer;
}

#chatbody {display:none;padding:10px;}
#chatlog {height:150px;overflow:auto;font-size:13px;}

.msg-user {text-align:right;margin:5px;}
.msg-bot {text-align:left;margin:5px;}

.suggestion {
  font-size:11px;
  background:#ff6b6b;
  margin:3px;
  padding:4px;
  border-radius:6px;
  cursor:pointer;
  display:inline-block;
}
</style>
</head>

<body>

<header>
  <h2>❤️ NGO Impact</h2>
  <div>
    <button onclick="showHome()">Home</button>
    <button id="loginBtn" onclick="showLogin()">Login</button>
    <button id="signupBtn" onclick="showSignup()">Signup</button>
    <button id="dashboardBtn" onclick="showDashboard()" style="display:none;">Dashboard</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
    <button onclick="toggleTheme()">🌗</button>
  </div>
</header>

<div class="container" id="app"></div>

<!-- CHAT -->
<div id="chatbox">
  <div id="chatheader" onclick="toggleChat()">💬 Assistant</div>
  <div id="chatbody">
    <div id="chatlog"></div>

    <div>
      <span class="suggestion" onclick="quickAsk('how')">How it works</span>
      <span class="suggestion" onclick="quickAsk('donation')">Donations</span>
      <span class="suggestion" onclick="quickAsk('money')">Where money goes</span>
    </div>

    <input id="chatInput" placeholder="Ask...">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const API = "https://ngo-backend-5zc1.onrender.com";
let token = localStorage.getItem("token");

const loginBtn = document.getElementById("loginBtn");
const signupBtn = document.getElementById("signupBtn");
const dashboardBtn = document.getElementById("dashboardBtn");
const logoutBtn = document.getElementById("logoutBtn");
const app = document.getElementById("app");

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* NAV */
function updateNav(){
  if(token){
    loginBtn.style.display="none";
    signupBtn.style.display="none";
    dashboardBtn.style.display="inline-block";
    logoutBtn.style.display="inline-block";
  } else {
    loginBtn.style.display="inline-block";
    signupBtn.style.display="inline-block";
    dashboardBtn.style.display="none";
    logoutBtn.style.display="none";
  }
}

/* HOME */
function showHome(){
  app.innerHTML=`
  <div class="hero">
    <h1>Donate & Save Lives 🌍</h1>
    <p>Transparency. Trust. Impact.</p>
    <button onclick="showLogin()">Get Started</button>
  </div>

  <div class="card">
    <h3>Impact</h3>
    <p>₹500 = Feeds 5 people</p>
    <p>₹1000 = Educates a child</p>
    <p>₹2000 = Medical support</p>
  </div>`;
}

/* LOGIN */
function showLogin(){
  app.innerHTML=`
  <div class="card">
    <h2>Login</h2>
    <input id="email"><br>
    <input id="password" type="password"><br>
    <button onclick="login()">Login</button>
  </div>`;
}

async function login(){
  const res=await fetch(`${API}/api/auth/login`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data=await res.json();
  if(data.token){
    token=data.token;
    localStorage.setItem("token",token);
    updateNav();
    showDashboard();
  }
}

/* SIGNUP */
function showSignup(){
  app.innerHTML=`
  <div class="card">
    <h2>Signup</h2>
    <input id="email"><br>
    <input id="password" type="password"><br>
    <button onclick="signup()">Signup</button>
  </div>`;
}

async function signup(){
  await fetch(`${API}/api/auth/signup`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });
  alert("Signup done");
  showLogin();
}

/* DASHBOARD */
function showDashboard(){
  app.innerHTML=`
  <h2>Dashboard</h2>

  <div class="card">
    <h3>💰 Donate</h3>
    <input id="amount" placeholder="Amount">
    <button onclick="donate()">Donate</button>
  </div>

  <div class="card">
    <h3>📊 Total Donations</h3>
    ₹<span id="total">0</span>
  </div>

  <div class="card">
    <h3>📜 History</h3>
    <ul id="donations"></ul>
  </div>`;

  loadDonations();
}

async function donate(){
  await fetch(`${API}/api/donations`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({amount:amount.value})
  });
  loadDonations();
}

async function loadDonations(){
  const res=await fetch(`${API}/api/donations`,{
    headers:{"Authorization":"Bearer "+token}
  });

  const data=await res.json();
  let total=0;
  donations.innerHTML="";

  data.slice().reverse().forEach(d=>{
    total+=Number(d.amount);
    donations.innerHTML+=`<li>💸 ₹${d.amount}</li>`;
  });

  document.getElementById("total").innerText=total;
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  token=null;
  updateNav();
  showHome();
}

/* CHAT */
function toggleChat(){
  chatbody.style.display =
    chatbody.style.display==="none"?"block":"none";
}

function quickAsk(q){
  chatInput.value=q;
  sendMsg();
}

function sendMsg(){
  let msg=chatInput.value.toLowerCase();
  chatlog.innerHTML+=`<div class="msg-user">${msg}</div>`;

  let reply="Try asking about donations or impact.";

  if(msg.includes("how"))
    reply="Signup → Login → Donate → Track history.";
  else if(msg.includes("donation"))
    reply="All donations are tracked in your dashboard.";
  else if(msg.includes("money"))
    reply="Funds go to food, education & healthcare NGOs.";
  else if(msg.includes("ngo"))
    reply="NGOs are organizations helping people in need.";

  chatlog.innerHTML+=`<div class="msg-bot">${reply}</div>`;
  chatInput.value="";
}

/* INIT */
updateNav();
showHome();
</script>

</body>
</html>
