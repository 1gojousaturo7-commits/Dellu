<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crazy Coders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

:root {
  --bg:#0f2027;
  --text:white;
  --card:rgba(255,255,255,0.08);
}

.light {
  --bg:#fff3e0;
  --text:#5d4037;
  --card:#ffffff;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 50px;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

.nav-right {
  display:flex;
  gap:10px;
  align-items:center;
}

.nav-right button {
  padding:10px 18px;
  border-radius:25px;
  border:none;
  font-weight:600;
  background:linear-gradient(45deg,#ff6b6b,#ff8e53);
  color:white;
  cursor:pointer;
}

#profile {
  display:none;
  padding:8px 12px;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
}

/* CONTAINER */
.container {padding:60px;text-align:center;}

/* HERO */
.hero h1 {
  font-size:55px;
  background:linear-gradient(45deg,#ff6b6b,#ffd166);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p {margin-top:15px;color:#ccc;}

.hero button {
  margin-top:20px;
  padding:12px 25px;
  border-radius:25px;
  background:#ff6b6b;
  border:none;
}

/* FEATURES */
.features {
  margin-top:60px;
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
}

.feature-card {
  background:var(--card);
  padding:20px;
  border-radius:15px;
  width:230px;
}

/* DASH */
.dash-card {
  background:var(--card);
  padding:20px;
  border-radius:15px;
  width:250px;
  margin:auto;
}

ul {list-style:none;}
li {
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin:8px 0;
  background:rgba(255,255,255,0.05);
  border-radius:8px;
}

/* CHAT */
#chatbox {
  position:fixed;
  bottom:20px;
  right:20px;
  width:260px;
  background:var(--card);
  border-radius:12px;
}

#chatheader {
  background:#ff6b6b;
  padding:10px;
  cursor:pointer;
}

#chatbody {display:none;padding:10px;}
</style>
</head>

<body>

<header>
  <h2>🚀 Crazy Coders</h2>

  <div class="nav-right">
    <span id="profile"></span>

    <button onclick="showHome()">Home</button>
    <button id="loginBtn" onclick="showLogin()">Login</button>
    <button id="signupBtn" onclick="showSignup()">Signup</button>
    <button id="dashboardBtn" onclick="showDashboard()" style="display:none;">Dashboard</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
    <button onclick="toggleTheme()">🌗</button>
  </div>
</header>

<div class="container" id="app"></div>

<!-- CHAT -->
<div id="chatbox">
  <div id="chatheader" onclick="toggleChat()">💬 Help</div>
  <div id="chatbody">
    <div id="chatlog"></div>
    <input id="chatInput">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const API="https://ngo-backend-5zc1.onrender.com";
let token=localStorage.getItem("token");

/* NAV */
function updateNav(){
  let email = localStorage.getItem("email");

  if(token){
    loginBtn.style.display="none";
    signupBtn.style.display="none";
    dashboardBtn.style.display="inline";
    logoutBtn.style.display="inline";

    let username = email.split("@")[0];
    profile.style.display="inline";
    profile.innerText="👤 " + username;
  } else {
    loginBtn.style.display="inline";
    signupBtn.style.display="inline";
    dashboardBtn.style.display="none";
    logoutBtn.style.display="none";
    profile.style.display="none";
  }
}

/* HOME */
function showHome(){
  app.innerHTML = `
  <div class="hero">
    <h1>🌍 Empower NGOs</h1>
    <p>Track Donations • Ensure Transparency • Make Real Impact</p>
    <button onclick="showLogin()">Get Started</button>
  </div>

  <div class="features">
    <div class="feature-card">💰 Donations</div>
    <div class="feature-card">📊 Analytics</div>
    <div class="feature-card">🤝 Volunteers</div>
  </div>`;
}

/* LOGIN */
function showLogin(){
  app.innerHTML=`
  <div class="dash-card">
    <h2>Login</h2>
    <input id="email"><br><br>
    <input id="password" type="password"><br><br>
    <button onclick="login()">Login</button>
  </div>`;
}

async function login(){
  const res=await fetch(API+"/api/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });

  const data=await res.json();

  if(data.token){
    token=data.token;
    localStorage.setItem("token",token);
    localStorage.setItem("email",email.value);
    updateNav();
    showDashboard();
  }
}

/* SIGNUP */
function showSignup(){
  app.innerHTML=`
  <div class="dash-card">
    <h2>Signup</h2>
    <input id="email"><br><br>
    <input id="password" type="password"><br><br>
    <button onclick="signup()">Signup</button>
  </div>`;
}

async function signup(){
  await fetch(API+"/api/auth/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });
  alert("Signup done");
  showLogin();
}

/* DASHBOARD */
function showDashboard(){
  app.innerHTML=`
  <h1>📊 Dashboard</h1>

  <div class="dash-card">
    <h3>💰 Donate</h3>
    <input id="amount"><br><br>
    <button onclick="donate()">Donate</button>
  </div>

  <div style="max-width:600px;margin:30px auto;">
    <div class="dash-card">
      <h3>📜 Donation History</h3>
      <ul id="donations"></ul>
    </div>
  </div>
  `;

  loadDonations();
}

/* DONATE */
function donate(){
  let amt=amount.value;
  let email=localStorage.getItem("email");
  let username=email.split("@")[0];

  confirmPayment(username,amt);
}

async function confirmPayment(username,amount){
  await fetch(API+"/api/donations",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({amount,username})
  });

  alert("Donation Successful");
  showDashboard();
}

/* LOAD DONATIONS */
async function loadDonations(){
  const res=await fetch(API+"/api/donations",{
    headers:{Authorization:"Bearer "+token}
  });

  const data=await res.json();

  donations.innerHTML="";

  data.reverse().forEach(d=>{
    donations.innerHTML+=`
    <li>
      <span>${d.username}</span>
      <span>₹${d.amount}</span>
    </li>`;
  });
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  token=null;
  updateNav();
  showHome();
}

/* CHAT */
function toggleChat(){
  chatbody.style.display=chatbody.style.display==="none"?"block":"none";
}

function sendMsg(){
  let msg=chatInput.value;
  chatlog.innerHTML+=`<div>🧑 ${msg}</div>`;

  let reply="Ask about donations";

  if(msg.includes("money")) reply="Funds go to NGO causes";
  if(msg.includes("how")) reply="Login → Donate → Track";

  chatlog.innerHTML+=`<div>🤖 ${reply}</div>`;
}

/* INIT */
updateNav();
showHome();
</script>

</body>
</html>
