<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NGO Impact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.btn {
  background: #ff6b6b;
  color: white;
  margin-left: 10px;
}

.container {
  padding: 40px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  margin-top: 20px;
  border-radius: 10px;
}

input {
  padding: 10px;
  margin: 5px;
  width: 200px;
}
</style>
</head>

<body>

<header>
  <h2>❤️ NGO Impact</h2>

  <div id="nav">
    <button class="btn" onclick="showHome()">Home</button>
    <button class="btn" id="loginBtn" onclick="showLogin()">Login</button>
    <button class="btn" id="signupBtn" onclick="showSignup()">Signup</button>
    <button class="btn" id="dashboardBtn" onclick="showDashboard()" style="display:none;">Dashboard</button>
    <button class="btn" id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
  </div>
</header>

<div class="container" id="app"></div>

<script>
const API = "https://ngo-backend-5zc1.onrender.com";
let token = localStorage.getItem("token");

// ELEMENTS
const loginBtn = document.getElementById("loginBtn");
const signupBtn = document.getElementById("signupBtn");
const dashboardBtn = document.getElementById("dashboardBtn");
const logoutBtn = document.getElementById("logoutBtn");
const app = document.getElementById("app");

// NAV
function updateNav() {
  if (token) {
    loginBtn.style.display = "none";
    signupBtn.style.display = "none";
    dashboardBtn.style.display = "inline-block";
    logoutBtn.style.display = "inline-block";
  } else {
    loginBtn.style.display = "inline-block";
    signupBtn.style.display = "inline-block";
    dashboardBtn.style.display = "none";
    logoutBtn.style.display = "none";
  }
}

// HOME
function showHome() {
  app.innerHTML = `
    <h1>Donate & Save Lives 🌍</h1>
    <p>Help provide food, shelter & hope.</p>
    <button onclick="showLogin()">Get Started</button>
  `;
}

// LOGIN
function showLogin() {
  app.innerHTML = `
    <h2>Login</h2>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
  `;
}

async function login() {
  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();

    if (data.token) {
      token = data.token;
      localStorage.setItem("token", token);
      alert("Login success 🚀");
      updateNav();
      showDashboard();
    } else {
      alert(data.message || "Login failed");
    }
  } catch {
    alert("Server error");
  }
}

// SIGNUP
function showSignup() {
  app.innerHTML = `
    <h2>Signup</h2>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="signup()">Signup</button>
  `;
}

async function signup() {
  try {
    const res = await fetch(`${API}/api/auth/signup`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();

    if (data.message) {
      alert("Signup successful ✅ Please login");
      showLogin();
    } else {
      alert("Signup failed");
    }
  } catch {
    alert("Server error");
  }
}

// DASHBOARD
function showDashboard() {
  if (!token) return showLogin();

  app.innerHTML = `
    <h2>Dashboard</h2>

    <div class="card">
      <h3>Donate</h3>
      <input id="amount" placeholder="Amount">
      <button onclick="donate()">Donate</button>
    </div>

    <div class="card">
      <h3>Your Donations</h3>
      <ul id="donations">Loading...</ul>
    </div>
  `;

  loadDonations();
}

// DONATE
async function donate() {
  try {
    await fetch(`${API}/api/donations`, {
      method: "POST",
      headers: {
        "Content-Type":"application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        amount: document.getElementById("amount").value
      })
    });

    loadDonations();
  } catch {
    alert("Donation failed");
  }
}

// LOAD DONATIONS
async function loadDonations() {
  try {
    const res = await fetch(`${API}/api/donations`, {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const data = await res.json();
    const list = document.getElementById("donations");

    if (!Array.isArray(data)) {
      list.innerHTML = "Error loading donations";
      return;
    }

    if (data.length === 0) {
      list.innerHTML = "<li>No donations yet</li>";
      return;
    }

    list.innerHTML = "";
    data.forEach(d => {
      list.innerHTML += `<li>₹${d.amount}</li>`;
    });

  } catch {
    document.getElementById("donations").innerHTML = "Server error";
  }
}

// LOGOUT
function logout() {
  localStorage.removeItem("token");
  token = null;
  updateNav();
  showHome();
}

// INIT
updateNav();
showHome();

</script>

</body>
</html>
