<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Impact Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo{
  font-weight:700;
  font-size:22px;
}

.nav button{
  margin-left:10px;
  padding:10px 16px;
  border:none;
  border-radius:20px;
  background:#ff6b6b;
  color:white;
  cursor:pointer;
}

/* HERO */
.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:60px;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(10px);
}

/* BUTTON */
.primary{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#00c9a7;
  color:white;
  cursor:pointer;
}

/* DASHBOARD */
.dashboard{
  padding:40px;
  display:none;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
}

/* INPUT */
input{
  padding:10px;
  width:100%;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

/* HISTORY */
.history-item{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <div class="logo">❤️ NGO Impact</div>

  <div>
    <button onclick="showHome()">Home</button>
    <button id="loginBtn" onclick="showLogin()">Login</button>
    <button id="signupBtn" onclick="showSignup()">Signup</button>
    <button id="dashBtn" style="display:none;" onclick="showDash()">Dashboard</button>
    <button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="hero">
  <div>
    <h1>Donate & Save Lives 🌍</h1>
    <p>Every ₹500 helps save a life. Be the reason someone smiles today.</p>
    <button class="primary" onclick="showSignup()">Get Started</button>
  </div>

  <div class="glass">
    <h3>Quick Donate</h3>
    <input id="quickAmount" placeholder="Enter amount">
    <button class="primary" onclick="quickDonate()">Donate</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="hero" style="display:none;">
  <div class="glass">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="primary" onclick="login()">Login</button>
  </div>
</div>

<!-- SIGNUP -->
<div id="signup" class="hero" style="display:none;">
  <div class="glass">
    <h2>Signup</h2>
    <input id="signupEmail" placeholder="Email">
    <input id="signupPass" type="password" placeholder="Password">
    <button class="primary" onclick="signup()">Signup</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

  <div class="cards">
    <div class="card">
      <h3 id="total">₹0</h3>
      <p>Total Donations</p>
    </div>

    <div class="card">
      <h3 id="lives">0</h3>
      <p>Lives Saved</p>
    </div>

    <div class="card">
      <h3 id="badge">🥉</h3>
      <p>Your Badge</p>
    </div>
  </div>

  <div class="glass" style="margin-top:30px;">
    <h3>Donate</h3>
    <input id="amount" placeholder="Amount">
    <button class="primary" onclick="donate()">Donate</button>
  </div>

  <div class="glass" style="margin-top:30px;">
    <h3>Your Donations</h3>
    <div id="history"></div>
  </div>

</div>

<script>

/* NAV CONTROL */
function updateNav(){
  let user = localStorage.getItem("user");

  document.getElementById("loginBtn").style.display = user ? "none" : "inline-block";
  document.getElementById("signupBtn").style.display = user ? "none" : "inline-block";
  document.getElementById("dashBtn").style.display = user ? "inline-block" : "none";
  document.getElementById("logoutBtn").style.display = user ? "inline-block" : "none";
}

/* PAGE SWITCH */
function showHome(){
  document.getElementById("home").style.display="flex";
  document.getElementById("login").style.display="none";
  document.getElementById("signup").style.display="none";
  document.getElementById("dashboard").style.display="none";
}

function showLogin(){
  document.getElementById("home").style.display="none";
  document.getElementById("login").style.display="flex";
  document.getElementById("signup").style.display="none";
}

function showSignup(){
  document.getElementById("home").style.display="none";
  document.getElementById("signup").style.display="flex";
  document.getElementById("login").style.display="none";
}

function showDash(){
  if(!localStorage.getItem("user")) return alert("Login first");

  document.getElementById("home").style.display="none";
  document.getElementById("login").style.display="none";
  document.getElementById("signup").style.display="none";
  document.getElementById("dashboard").style.display="block";

  loadData();
}

/* AUTH */
function signup(){
  let users = JSON.parse(localStorage.getItem("users")) || [];

  if(users.find(u=>u.email===signupEmail.value)){
    alert("User already exists");
    return;
  }

  users.push({email:signupEmail.value, pass:signupPass.value});
  localStorage.setItem("users", JSON.stringify(users));

  alert("Signup successful!");
  showLogin();
}

function login(){
  let users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u =>
    u.email === loginEmail.value &&
    u.pass === loginPass.value
  );

  if(user){
    localStorage.setItem("user", user.email);
    updateNav();
    showDash();
  } else {
    alert("Invalid login");
  }
}

function logout(){
  localStorage.removeItem("user");
  updateNav();
  showHome();
}

/* DONATIONS */
function donate(){
  let user = localStorage.getItem("user");
  if(!user) return alert("Login required");

  let amt = Number(document.getElementById("amount").value);
  if(amt <= 0) return alert("Enter valid amount");

  let data = JSON.parse(localStorage.getItem("donations")) || [];

  data.push({user, amt});
  localStorage.setItem("donations", JSON.stringify(data));

  loadData();
}

function quickDonate(){
  if(!localStorage.getItem("user")){
    alert("Login first");
    showLogin();
    return;
  }

  document.getElementById("amount").value = document.getElementById("quickAmount").value;
  donate();
}

/* LOAD USER DATA */
function loadData(){
  let user = localStorage.getItem("user");
  let data = JSON.parse(localStorage.getItem("donations")) || [];

  let userData = data.filter(d => d.user === user);

  let total = userData.reduce((s,d)=>s+d.amt,0);
  document.getElementById("total").innerText = "₹" + total;

  let lives = Math.floor(total/500);
  document.getElementById("lives").innerText = lives;

  let badge = "🥉 Bronze";
  if(total > 5000) badge="🥇 Gold";
  else if(total > 2000) badge="🥈 Silver";

  document.getElementById("badge").innerText = badge;

  let history = document.getElementById("history");
  history.innerHTML = "";

  userData.reverse().forEach(d=>{
    let div = document.createElement("div");
    div.className = "history-item";
    div.innerHTML = `<span>₹${d.amt}</span>`;
    history.appendChild(div);
  });
}

/* INITIAL LOAD */
updateNav();
showHome();

</script>

</body>
</html>
