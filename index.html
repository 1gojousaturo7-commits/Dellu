<!DOCTYPE html>
<html>
<head>
  <title>DELLU NGO System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-10">

  <h1 class="text-4xl font-bold mb-6">🌐 DELLU NGO System</h1>

  <!-- Donation Form -->
  <div class="bg-gray-800 p-6 rounded mb-6">
    <h2 class="text-xl mb-3">💰 Add Donation</h2>

    <input id="name" placeholder="Donor Name" class="p-2 text-black block mb-2 w-full">
    <input id="amount" placeholder="Amount" class="p-2 text-black block mb-2 w-full">
    <input id="usage" placeholder="Usage (where money goes)" class="p-2 text-black block mb-2 w-full">

    <button onclick="addDonation()" class="bg-green-500 px-4 py-2 rounded">
      Add Donation
    </button>
  </div>

  <!-- AI Assistant -->
  <div class="bg-gray-800 p-6 rounded mb-6">
    <h2 class="text-xl mb-3">🤖 AI Assistant</h2>

    <input id="question" placeholder="Ask something..." class="p-2 text-black w-full mb-2">

    <button onclick="fakeAI()" class="bg-blue-500 px-4 py-2 rounded">
      Ask AI
    </button>

    <p id="aiResponse" class="mt-3 text-gray-300"></p>
  </div>

  <!-- Transparency -->
  <div class="bg-gray-800 p-6 rounded">
    <h2 class="text-xl mb-3">🔍 Transparency</h2>
    <div id="list"></div>
  </div>

  <script>
    let donations = [];

    function addDonation() {
      const name = document.getElementById("name").value;
      const amount = document.getElementById("amount").value;
      const usage = document.getElementById("usage").value;

      donations.push({ name, amount, usage });
      render();
    }

    function render() {
      const list = document.getElementById("list");

      list.innerHTML = donations.map(d =>
        `<div class="bg-gray-700 p-3 mt-2 rounded">
          ${d.name} donated ₹${d.amount}<br>
          <small>Used for: ${d.usage}</small>
        </div>`
      ).join("");
    }

    // Fake AI (for demo only)
    function fakeAI() {
      const q = document.getElementById("question").value;

      let response = "I can help with NGO activities!";

      if (q.includes("donation")) {
        response = "Donations are used transparently as shown below.";
      } else if (q.includes("volunteer")) {
        response = "Volunteers can join events and help NGOs.";
      }

      document.getElementById("aiResponse").innerText = response;
    }
  </script>

</body>
</html>
