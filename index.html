<!DOCTYPE html>
    <p id="aiResponse" class="mt-3"></p>
  </div>

  <!-- TRANSPARENCY -->
  <div id="transparency" class="section hidden">
    <h2 class="text-xl mb-3">🔍 Transparency</h2>
    <div id="list"></div>
  </div>

</div>

<script>
  // SIMPLE LOGIN (demo only)
  function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234") {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
    } else {
      document.getElementById("error").innerText = "Invalid login";
    }
  }

  function logout() {
    location.reload();
  }

  function show(section) {
    document.querySelectorAll(".section").forEach(s => s.classList.add("hidden"));
    document.getElementById(section).classList.remove("hidden");
  }

  let donations = [];

  function addDonation() {
    const name = document.getElementById("name").value;
    const amount = document.getElementById("amount").value;
    const usage = document.getElementById("usage").value;

    donations.push({name, amount, usage});
    render();
  }

  function render() {
    const list = document.getElementById("list");

    list.innerHTML = donations.map(d =>
      `<div class="bg-gray-700 p-3 mt-2 rounded shadow">
        ${d.name} donated ₹${d.amount}<br>
        <small>Used for: ${d.usage}</small>
      </div>`
    ).join("");
  }

  function fakeAI() {
    const q = document.getElementById("question").value;

    let res = "I can help with NGO operations.";

    if(q.includes("donation")) res = "All donations are shown in transparency section.";
    if(q.includes("volunteer")) res = "Volunteers can join events and help NGOs.";

    document.getElementById("aiResponse").innerText = res;
  }
</script>

</body>
</html>
