<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crazy Coders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
  perspective: 1000px;
}

:root {
  --bg:#0f2027;
  --text:white;
  --card:rgba(255,255,255,0.08);
}

/* ORANGE LIGHT MODE */
.light {
  --bg:#fff3e0;
  --text:#5d4037;
  --card:#ffffff;
}

/* NAV */
header {
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:rgba(0,0,0,0.3);
}

.nav-right {
  display:flex;
  align-items:center;
  gap:10px;
}

#profile {
  display:none;
  padding:8px 12px;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
}

button {
  padding:10px 16px;
  border:none;
  border-radius:20px;
  background:#ff6b6b;
  color:white;
  cursor:pointer;
}

button:hover {
  transform: translateY(-3px) scale(1.05);
  background:#ff3b3b;
}

/* CONTAINER */
.container {padding:60px;text-align:center;}

/* HERO */
.hero h1 {font-size:50px;margin-bottom:10px;}
.hero p {margin-bottom:20px;color:#ccc;}

/* CARD */
.card {
  background:var(--card);
  padding:25px;
  margin:40px auto;
  border-radius:15px;
  width:300px;
  transition:0.4s;
}

.card:hover {
  transform: rotateX(5deg) rotateY(5deg) scale(1.03);
}

/* DASH */
.dash-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.dash-card {
  background:var(--card);
  padding:25px;
  border-radius:15px;
  width:250px;
}

input {
  padding:10px;
  width:90%;
  border-radius:8px;
  border:none;
  margin:5px;
}

ul {list-style:none;}
ul li {
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
}

/* CHAT */
#chatbox {
  position:fixed;
  bottom:20px;
  right:20px;
  width:260px;
  background:var(--card);
  border-radius:12px;
}

#chatheader {
  background:#ff6b6b;
  padding:10px;
  cursor:pointer;
}

#chatbody {display:none;padding:10px;}
#chatlog {height:150px;overflow:auto;font-size:13px;}
</style>
</head>

<body>

<header>
  <h2>🚀 Crazy Coders</h2>

  <div class="nav-right">
    <span id="profile"></span>

    <button onclick="showHome()">Home</button>
    <button id="loginBtn" onclick="showLogin()">Login</button>
    <button id="signupBtn" onclick="showSignup()">Signup</button>
    <button id="dashboardBtn" onclick="showDashboard()" style="display:none;">Dashboard</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
    <button onclick="toggleTheme()">🌗</button>
  </div>
</header>

<div class="container" id="app"></div>

<!-- CHAT -->
<div id="chatbox">
  <div id="chatheader" onclick="toggleChat()">💬 Help</div>
  <div id="chatbody">
    <div id="chatlog"></div>
    <input id="chatInput">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const API="https://ngo-backend-5zc1.onrender.com";
let token=localStorage.getItem("token");

function toggleTheme(){document.body.classList.toggle("light");}

/* NAV */
function updateNav(){
  let email = localStorage.getItem("email");

  if(token){
    loginBtn.style.display="none";
    signupBtn.style.display="none";
    dashboardBtn.style.display="inline";
    logoutBtn.style.display="inline";

    let username = email ? email.split("@")[0] : "User";
    profile.style.display="inline";
    profile.innerText="👤 " + username;

  } else {
    loginBtn.style.display="inline";
    signupBtn.style.display="inline";
    dashboardBtn.style.display="none";
    logoutBtn.style.display="none";
    profile.style.display="none";
  }
}

/* HOME */
function showHome(){
  app.innerHTML=`
  <div class="hero">
    <h1>Crazy Coders 🌍</h1>
    <p>Innovating for NGOs • Transparency • Impact</p>
    <button onclick="showLogin()">Get Started</button>
  </div>`;
}

/* LOGIN */
function showLogin(){
  app.innerHTML=`
  <div class="card">
    <h2>Login</h2>
    <input id="email"><br>
    <input id="password" type="password"><br>
    <button onclick="login()">Login</button>
  </div>`;
}

async function login(){
  const res=await fetch(API+"/api/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });

  const data=await res.json();

  if(data.token){
    token=data.token;
    localStorage.setItem("token",token);
    localStorage.setItem("email", email.value);

    updateNav();
    showDashboard();
  }
}

/* SIGNUP */
function showSignup(){
  app.innerHTML=`
  <div class="card">
    <h2>Signup</h2>
    <input id="email"><br>
    <input id="password" type="password"><br>
    <button onclick="signup()">Signup</button>
  </div>`;
}

async function signup(){
  await fetch(API+"/api/auth/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });
  alert("Signup done");
  showLogin();
}

/* DASHBOARD */
function showDashboard(){
  app.innerHTML=`
  <h1>📊 Dashboard</h1>

  <div class="dash-container">
    <div class="dash-card">
      <h3>💰 Donate</h3>
      <input id="amount">
      <button onclick="donate()">Donate</button>
    </div>
  </div>

  <div style="max-width:500px;margin:30px auto;">
    <div class="dash-card">
      <h3>📜 History</h3>
      <ul id="donations"></ul>
    </div>
  </div>
  `;

  loadDonations();
}

/* PAYMENT */
function donate(){
  let amt=amount.value;
  let email = localStorage.getItem("email") || "user";
  let username = email.split("@")[0];

  app.innerHTML=`
  <div class="card">
    <h2>💳 Payment</h2>
    <p>Name: ${username}</p>
    <p>Amount: ₹${amt}</p>
    <button onclick="confirmPayment('${username}',${amt})">Pay Now</button>
  </div>`;
}

async function confirmPayment(username,amount){
  await fetch(API+"/api/donations",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({amount, username})
  });

  alert("Payment Successful");
  showDashboard();
}

/* LOAD */
async function loadDonations(){
  const res=await fetch(API+"/api/donations",{
    headers:{Authorization:"Bearer "+token}
  });

  const data=await res.json();
  donations.innerHTML="";

  data.slice().reverse().forEach(d=>{
    donations.innerHTML+=`
    <li>
      <span>${d.username || "User"}</span>
      <span>₹${d.amount}</span>
    </li>`;
  });
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  localStorage.removeItem("email");
  token=null;
  updateNav();
  showHome();
}

/* CHAT */
function toggleChat(){
  chatbody.style.display=chatbody.style.display==="none"?"block":"none";
}

function sendMsg(){
  let msg=chatInput.value.toLowerCase();
  chatlog.innerHTML+=`<div>🧑 ${msg}</div>`;

  let reply="Ask about donations or NGOs";

  if(msg.includes("donation")) reply="Donate from dashboard and track history";
  else if(msg.includes("money")) reply="Funds go to food, education and health";
  else if(msg.includes("how")) reply="Signup → Login → Donate";

  chatlog.innerHTML+=`<div>🤖 ${reply}</div>`;
  chatInput.value="";
}

/* INIT */
updateNav();
showHome();
</script>

</body>
</html>
